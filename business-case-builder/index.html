<!doctype html>
<html lang="en" data-theme="teal">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Business Case Builder — from idea to financial prediction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-primary:#001a20; --bg-secondary:#002a33;
    --bg-surface:rgba(0,50,60,.55); --bg-surface-2:rgba(0,42,51,.92);
    --accent:#7DE38D; --accent-rgb:125,227,141; --accent-2:#288f5b;
    --text:#e0f0e8; --text-dim:#8fb8a0; --text-mut:#5a8a70;
    --border:rgba(125,227,141,.18); --border-strong:rgba(125,227,141,.4);
    --danger:#ff6b6b; --warn:#ffd166; --info:#4ecdc4;
    --mono:'Inconsolata',ui-monospace,monospace; --disp:'Space Grotesk',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:
     radial-gradient(1200px 600px at 80% -10%, rgba(125,227,141,.06), transparent 60%),
     var(--bg-primary); color:var(--text); font-family:var(--mono); font-size:15px; line-height:1.5;}
  a{color:var(--accent);}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 20px 90px;}

  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px;}
  .brand{font-family:var(--disp);font-weight:700;font-size:19px;color:var(--text);}
  .brand .pp{color:var(--accent);text-shadow:0 0 10px rgba(var(--accent-rgb),.4);}
  .brand small{display:block;font-family:var(--mono);font-weight:400;font-size:12px;color:var(--text-dim);}
  .topbar .spacer{flex:1}
  .btn{font-family:var(--mono);font-size:12.5px;color:var(--text-dim);background:transparent;border:1px solid var(--border);
    border-radius:7px;padding:7px 11px;cursor:pointer;transition:.15s;}
  .btn:hover{color:var(--accent);border-color:var(--border-strong);box-shadow:0 0 10px rgba(var(--accent-rgb),.12);}
  .btn.primary{color:var(--bg-primary);background:var(--accent);border-color:var(--accent);font-weight:700;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* stepper */
  .stepper{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .stp{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);border-radius:8px;
    padding:7px 11px;cursor:pointer;color:var(--text-dim);font-size:12.5px;transition:.15s;}
  .stp:hover{color:var(--text);border-color:var(--border-strong);}
  .stp .num{width:19px;height:19px;border-radius:50%;border:1px solid var(--border-strong);display:inline-flex;
    align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;}
  .stp.on{color:var(--accent);border-color:var(--accent);background:rgba(var(--accent-rgb),.08);box-shadow:0 0 12px rgba(var(--accent-rgb),.12);}
  .stp.on .num{background:var(--accent);color:var(--bg-primary);border-color:var(--accent);}
  .progress{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:22px;overflow:hidden;}
  .progress i{display:block;height:100%;background:var(--accent);box-shadow:0 0 8px rgba(var(--accent-rgb),.5);transition:width .3s;}

  .idea input.name{font-family:var(--disp);font-weight:700;font-size:24px;color:var(--text);background:transparent;border:none;
    border-bottom:1px dashed transparent;width:100%;padding:2px 0;}
  .idea input.name:hover,.idea input.name:focus{border-bottom-color:var(--border);outline:none;}
  .idea input.tag{font-family:var(--mono);font-size:13.5px;color:var(--text-dim);background:transparent;border:none;width:100%;padding:3px 0;}
  .idea input.tag:focus{outline:none;color:var(--text);}

  .stephead{font-family:var(--disp);font-weight:600;font-size:20px;color:var(--text);margin:18px 0 4px;display:flex;align-items:center;gap:10px;}
  .stephead .k{font-size:13px;color:var(--accent-2);font-weight:700;}
  .purpose{font-size:13px;color:var(--text-dim);margin-bottom:18px;border-left:2px solid var(--accent-2);padding-left:11px;}

  .block{background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:15px 16px;margin-bottom:14px;}
  .block h3{margin:0 0 4px;font-family:var(--mono);font-weight:700;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--accent);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .block .sub{font-size:11px;color:var(--text-mut);margin-bottom:10px;}
  label.fld{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim);margin:10px 0 4px;}
  textarea,input.txt,select{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:7px;color:var(--text);
    font-family:var(--mono);font-size:13.5px;padding:8px 10px;line-height:1.5;}
  textarea{resize:vertical;min-height:54px;}
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--border-strong);}
  select option{background:var(--bg-secondary);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

  /* data tables (years etc.) */
  .dt{width:100%;border-collapse:collapse;font-size:12.5px;}
  .dt th{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);text-align:right;padding:6px 7px;border-bottom:1px solid var(--border);}
  .dt th.l,.dt td.l{text-align:left;}
  .dt td{padding:3px 6px;border-bottom:1px solid rgba(125,227,141,.06);text-align:right;}
  .dt input{background:transparent;border:1px solid transparent;border-radius:5px;color:var(--text);font-family:var(--mono);
    font-size:12.5px;text-align:right;width:100%;min-width:58px;padding:4px 5px;}
  .dt input.l{text-align:left;}
  .dt input:hover{border-color:var(--border);}
  .dt input:focus{outline:none;border-color:var(--border-strong);background:rgba(0,0,0,.25);}
  .dt td.calc{color:var(--accent);font-weight:600;}
  .dt tr.total td{border-top:1px solid var(--border);font-weight:700;}
  .dt .rowlab{color:var(--text-dim);}
  .xbtn{background:transparent;border:none;color:var(--text-mut);cursor:pointer;font-size:15px;}
  .xbtn:hover{color:var(--danger);}
  .addrow{margin-top:9px;}
  .scrollx{overflow-x:auto;}

  /* KPIs + chart */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:var(--bg-surface);border:1px solid var(--border);border-radius:11px;padding:13px 14px;}
  .kpi .lbl{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);}
  .kpi .val{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--accent);margin-top:5px;text-shadow:0 0 12px rgba(var(--accent-rgb),.25);line-height:1.1;}
  .kpi .val.neg{color:var(--danger);text-shadow:none;}
  .kpi .sub{font-size:10.5px;color:var(--text-mut);margin-top:3px;}
  .chartbox{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:16px 16px 8px;margin-bottom:16px;}
  .legend{display:flex;gap:15px;flex-wrap:wrap;font-size:11.5px;color:var(--text-dim);margin-bottom:6px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;} .legend i{width:11px;height:11px;border-radius:2px;}

  /* help tooltip */
  .help{flex:none;width:16px;height:16px;border:1px solid var(--border);border-radius:50%;font-size:10px;color:var(--text-dim);
    display:inline-flex;align-items:center;justify-content:center;cursor:help;position:relative;font-weight:700;}
  .help:hover{color:var(--bg-primary);background:var(--accent);border-color:var(--accent);}
  .help .tip{visibility:hidden;opacity:0;transition:opacity .12s;position:absolute;z-index:40;top:135%;left:-6px;width:250px;
    background:var(--bg-secondary);border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;font-size:11.5px;
    line-height:1.55;color:var(--text-dim);text-transform:none;letter-spacing:0;font-weight:400;box-shadow:0 10px 30px rgba(0,0,0,.55);text-align:left;}
  .help:hover .tip{visibility:visible;opacity:1;}
  .help .tip .eg{display:block;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);color:var(--text-mut);}
  .help .tip .eg b{color:var(--accent-2);font-weight:700;}

  /* nav */
  .navbtns{display:flex;justify-content:space-between;margin-top:22px;}

  /* floating assumptions */
  .fab{position:fixed;right:22px;bottom:22px;z-index:50;background:var(--accent);color:var(--bg-primary);border:none;
    border-radius:30px;padding:12px 18px;font-family:var(--mono);font-weight:700;font-size:13.5px;cursor:pointer;
    box-shadow:0 8px 26px rgba(0,0,0,.5),0 0 16px rgba(var(--accent-rgb),.4);display:flex;align-items:center;gap:8px;}
  .fab:hover{filter:brightness(1.08);}
  .fab .cnt{background:var(--bg-primary);color:var(--accent);border-radius:20px;padding:1px 8px;font-size:12px;}
  .drawer-bg{position:fixed;inset:0;background:rgba(0,8,10,.55);z-index:55;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:var(--bg-surface-2);border-left:1px solid var(--border-strong);
    z-index:60;box-shadow:-12px 0 40px rgba(0,0,0,.5);display:flex;flex-direction:column;}
  .drawer header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .drawer header .t{font-family:var(--disp);font-weight:700;font-size:17px;}
  .drawer header .x{margin-left:auto;background:transparent;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;}
  .drawer header .x:hover{color:var(--accent);}
  .drawer .body{padding:14px 18px;overflow-y:auto;}
  .drawer .intro{font-size:12px;color:var(--text-dim);margin-bottom:12px;}
  .acard{background:var(--bg-surface);border:1px solid var(--border);border-radius:9px;padding:11px 12px;margin-bottom:10px;}
  .acard .top{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
  .acard .cat{font-size:11px;}
  .acard textarea{min-height:38px;}
  .acard .meta{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:7px;align-items:center;}
  .badge{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);}
  .badge.market{color:var(--info);border-color:rgba(78,205,196,.4);}
  .badge.costs{color:var(--warn);border-color:rgba(255,209,102,.4);}
  .badge.competitors{color:#c792ea;border-color:rgba(199,146,234,.4);}
  .badge.other{color:var(--text-dim);}
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer;}
  .chk input{accent-color:var(--accent);}

  .note{font-size:11.5px;color:var(--text-mut);margin-top:8px;}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;
const LS_KEY = "business-case-builder-v1";

/* ============ seed example (illustrative — replace with your own) ============ */
const SEED = {
  meta:{ name:"AeroSense", tagline:"A connected air-quality monitor sold with a monitoring subscription.", startYear:2026, years:5 },
  fundamentals:{
    problemWhat:"Offices and schools have no continuous, trustworthy view of indoor air quality (CO₂, PM2.5, VOCs).",
    problemWhy:"Poor air quality measurably lowers cognition and raises sick days, but facility managers only find out after complaints.",
    problemWho:"Facility & HSE managers in mid-to-large organisations across Europe.",
    solution:"A plug-and-play sensor that streams live air-quality data to a dashboard with alerts and compliance reports.",
    unfairAdvantage:"Calibrated multi-gas sensor at a hardware price competitors only reach with a subscription lock-in.",
    segments:[{name:"Corporate offices", early:"Tech firms with ESG mandates"},{name:"Schools & universities", early:"Private schools"}],
    channels:"Direct sales to facility teams; channel partners (HVAC installers); self-serve web for SMBs.",
    revenueStreams:[{name:"Device sale", desc:"One-off hardware purchase", seg:"All"},{name:"Monitoring subscription", desc:"Per-device annual SaaS", seg:"All"}]
  },
  assumptions:[
    {id:1, text:"European indoor-air market grows ~12%/yr through 2030", cat:"Market", amount:"12%", validated:true, comments:"Cross-checked with 2 analyst reports"},
    {id:2, text:"Blended production cost per unit settles around €420 at scale", cat:"Costs", amount:"420", validated:false, comments:"Depends on sensor supplier MOQ"},
    {id:3, text:"No incumbent bundles hardware + compliance reporting under €600", cat:"Competitors", amount:"", validated:false, comments:"Re-validate each quarter"}
  ],
  stakeholders:[
    {name:"Facility manager", desc:"Buyer & daily user — owns building comfort and compliance"},
    {name:"CFO", desc:"Approves spend; wants clear ROI on wellbeing/productivity"},
    {name:"Employees", desc:"Beneficiaries — healthier, more productive workspace"}
  ],
  needs:[
    {name:"Live visibility", desc:"See air quality in real time per room", stk:"Facility manager", priority:9},
    {name:"Actionable alerts", desc:"Be warned before thresholds are breached", stk:"Facility manager", priority:7},
    {name:"Compliance reports", desc:"Export audit-ready reports", stk:"CFO", priority:6},
    {name:"Zero-install setup", desc:"Works without IT involvement", stk:"Facility manager", priority:5}
  ],
  competitors:{
    rows:["Main statement","Price point","Live multi-gas","Alerts","Compliance export","Zero-install"],
    cols:["Our solution","Alternative #1","Alternative #2"],
    data:{
      "Main statement":["Hardware + reporting, no lock-in","Cheap CO₂-only sensor","Enterprise BMS module"],
      "Price point":["€600 + sub","€120","€5,000+"],
      "Live multi-gas":["9","3","7"],
      "Alerts":["8","4","6"],
      "Compliance export":["9","1","8"],
      "Zero-install":["9","7","2"]
    }
  },
  opportunity:{
    pricePerUnit:600,
    segments:[
      {name:"Portugal (national)", tam:[40000,44000,48400,53240,58564], reach:[1.5,3,5,7,9]},
      {name:"Spain",               tam:[0,90000,99000,108900,119790],   reach:[0,1,2,3.5,5]},
      {name:"Germany",             tam:[0,0,250000,275000,302500],      reach:[0,0,0.5,1.2,2]}
    ]
  },
  concept:{
    description:"Wall-mounted unit: multi-gas sensor array + edge module streaming to a cloud dashboard.",
    components:[
      {name:"Sensor array (multi-gas)", cost:160, module:"Hardware"},
      {name:"Edge compute + connectivity", cost:110, module:"Hardware"},
      {name:"Enclosure + assembly", cost:70, module:"Hardware"},
      {name:"Firmware + cloud (amortised/unit)", cost:80, module:"Software"}
    ]
  },
  specs:[
    {name:"CO₂ accuracy", component:"Hardware", target:"±30 ppm", need:"Live visibility"},
    {name:"Alert latency", component:"Software", target:"< 60 s", need:"Actionable alerts"},
    {name:"Report formats", component:"Software", target:"PDF + CSV, audit-ready", need:"Compliance reports"},
    {name:"Setup time", component:"Hardware", target:"< 5 min, no IT", need:"Zero-install setup"}
  ],
  finance:{
    productionCostPerUnit:420,
    fse:{
      "Office rent":[24000,24000,36000,48000,48000],
      "Communications":[6000,8000,10000,12000,14000],
      "Travel":[10000,15000,20000,25000,30000],
      "Merch transportation":[5000,10000,20000,30000,40000],
      "Insurances":[4000,5000,6000,7000,8000],
      "Marketing":[50000,80000,150000,250000,350000],
      "Legal/Consulting":[15000,15000,20000,25000,30000],
      "Others":[10000,12000,15000,18000,20000]
    },
    headcount:[4,6,10,16,22], costHeadcount:[35000,35000,36000,37000,38000],
    outsourcing:[2,3,4,5,6], costOutsourcing:[25000,25000,26000,27000,28000]
  }
};

const clone=o=>JSON.parse(JSON.stringify(o));
const pad=(a,n,fill=0)=>{a=Array.isArray(a)?a.slice(0,n):[];while(a.length<n)a.push(a.length?a[a.length-1]:fill);return a;};
const eur=(n)=>{if(!isFinite(n))return"—";const a=Math.abs(n);const s=n<0?"-":"";
  if(a>=1e6)return s+"€"+(a/1e6).toFixed(2)+"M"; if(a>=1e3)return s+"€"+(a/1e3).toFixed(0)+"k"; return s+"€"+Math.round(a);};
const eurF=(n)=>isFinite(n)?new Intl.NumberFormat('en-IE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n):"—";
const numF=(n)=>isFinite(n)?new Intl.NumberFormat('en-IE').format(Math.round(n)):"—";

/* ============ financial engine (mirrors the 360 Financial Plan) ============ */
function compute(model){
  const N=Math.max(1,Math.min(10,+model.meta.years||5));
  const yrs=Array.from({length:N},(_,i)=>(+model.meta.startYear||2026)+i);
  const price=+model.opportunity.pricePerUnit||0;
  const pc=+model.finance.productionCostPerUnit||0;
  const segs=model.opportunity.segments.map(s=>({name:s.name,tam:pad(s.tam,N),reach:pad(s.reach,N)}));
  const fseKeys=Object.keys(model.finance.fse);
  const rows=yrs.map((y,t)=>{
    let units=0; segs.forEach(s=> units += (+s.tam[t]||0)*((+s.reach[t]||0)/100));
    const revenue=units*price, cogs=units*pc, gm=revenue-cogs;
    let fse=0; fseKeys.forEach(k=> fse += +pad(model.finance.fse[k],N)[t]||0);
    const pers=(+pad(model.finance.headcount,N)[t]||0)*(+pad(model.finance.costHeadcount,N)[t]||0)
             + (+pad(model.finance.outsourcing,N)[t]||0)*(+pad(model.finance.costOutsourcing,N)[t]||0);
    const opex=fse+pers, ebitda=gm-opex;
    return {y,units,revenue,cogs,gm,fse,pers,opex,ebitda,gmPct:revenue?gm/revenue*100:0};
  });
  let cum=0; rows.forEach(r=>{cum+=r.ebitda;r.cum=cum;});
  const first=rows[0], last=rows[N-1];
  const cagr=(a,b,n)=> (a>0&&b>0&&n>0)? (Math.pow(b/a,1/n)-1)*100 : null;
  const breakeven=rows.find(r=>r.ebitda>=0);
  const cumBreak=rows.find(r=>r.cum>=0);
  return {N,yrs,segs,rows,
    revLast:last.revenue, revCagr:cagr(first.revenue,last.revenue,N-1),
    gmPctLast:last.gmPct, breakeven:breakeven?breakeven.y:null, cumBreak:cumBreak?cumBreak.y:null,
    cumEbitda:cum, peakEbitda:Math.max(...rows.map(r=>r.ebitda)),
    minCum:Math.min(...rows.map(r=>r.cum)) };
}

/* ============ chart: grouped bars (rev/gm/ebitda) + cumulative line ============ */
function Chart({r}){
  const W=760,H=300,pad={l:54,r:14,t:14,b:42};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const vals=r.rows.flatMap(d=>[d.revenue,d.gm,d.ebitda,d.cum,0]);
  const max=Math.max(...vals), min=Math.min(...vals,0);
  const Y=v=>pad.t+ih-(v-min)/((max-min)||1)*ih;
  const n=r.rows.length, gw=iw/n; const bw=gw*0.22;
  const cx=i=>pad.l+gw*i+gw/2;
  const ticks=[];for(let i=0;i<=4;i++)ticks.push(min+(max-min)*i/4);
  const series=[["revenue","#7DE38D"],["gm","#4ecdc4"],["ebitda","#ffd166"]];
  const cumPath=r.rows.map((d,i)=>(i?"L":"M")+cx(i).toFixed(1)+" "+Y(d.cum).toFixed(1)).join(" ");
  return (
   <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxWidth:W}}>
    {ticks.map((v,i)=>(<g key={i}>
      <line x1={pad.l} x2={W-pad.r} y1={Y(v)} y2={Y(v)} stroke="rgba(125,227,141,.10)"/>
      <text x={pad.l-8} y={Y(v)+3} textAnchor="end" fontSize="10" fill="#5a8a70" fontFamily="Inconsolata">{eur(v)}</text>
    </g>))}
    {min<0 && <line x1={pad.l} x2={W-pad.r} y1={Y(0)} y2={Y(0)} stroke="rgba(255,107,107,.45)" strokeDasharray="3 3"/>}
    {r.rows.map((d,i)=> series.map(([k,c],j)=>{
      const x=cx(i)+(j-1)*bw - bw/2 + bw/2;
      const xb=cx(i)-bw*1.5+j*bw;
      const y0=Y(0), y=Y(d[k]); const top=Math.min(y,y0), h=Math.abs(y-y0);
      return <rect key={k+i} x={xb} y={top} width={bw} height={Math.max(h,0.5)} fill={c} opacity={k==="ebitda"&&d[k]<0?0.6:0.92} rx="1"/>;
    }))}
    <path d={cumPath} fill="none" stroke="#c792ea" strokeWidth="2"/>
    {r.rows.map((d,i)=><circle key={"c"+i} cx={cx(i)} cy={Y(d.cum)} r="2.6" fill="#c792ea"/>)}
    {r.rows.map((d,i)=><text key={"x"+i} x={cx(i)} y={H-24} textAnchor="middle" fontSize="10.5" fill="#8fb8a0" fontFamily="Inconsolata">{d.y}</text>)}
   </svg>
  );
}

/* ============ small reusable bits ============ */
function Help({tip,eg}){
  return <span className="help" tabIndex="0">?<span className="tip">{tip}{eg&&<span className="eg"><b>Example —</b> {eg}</span>}</span></span>;
}
function YearHeader({yrs}){ return <tr><th className="l">Line</th>{yrs.map(y=><th key={y}>{y}</th>)}</tr>; }
function YearRow({label,arr,n,onChange,money,pct,calc}){
  const a=pad(arr,n);
  return (<tr className={calc?"total":""}>
    <td className="l rowlab">{label}</td>
    {a.map((v,i)=> calc
      ? <td key={i} className="calc">{money?eur(v):pct?(v.toFixed(1)+"%"):numF(v)}</td>
      : <td key={i}><input type="number" value={v} onChange={e=>onChange(i,+e.target.value)} /></td>)}
  </tr>);
}

function App(){
  const [model,setModel]=useState(()=>{try{const s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s);}catch(e){}return clone(SEED);});
  const [step,setStep]=useState(0);
  const [drawer,setDrawer]=useState(false);
  useEffect(()=>{try{localStorage.setItem(LS_KEY,JSON.stringify(model));}catch(e){}},[model]);

  const upd=(path,v)=>setModel(m=>{const c=clone(m);let o=c;const ks=path.split(".");for(let i=0;i<ks.length-1;i++)o=o[ks[i]];o[ks[ks.length-1]]=v;return c;});
  const r=useMemo(()=>compute(model),[model]);
  const N=r.N;

  const STEPS=[
    {k:"fund",  t:"Fundamentals & Strategy", p:"Define the problem, your solution and how you go to market — the qualitative spine of the case."},
    {k:"stake", t:"Stakeholder Pains & Competitors", p:"Who feels the pain, how intense each need is (1–9), and how alternatives score against you."},
    {k:"opp",   t:"Opportunity Size", p:"Size the market: TAM by segment and year, the share you expect to reach (SOM), and your price."},
    {k:"cost",  t:"Concept & Costs", p:"Break the product into components and their unit costs — the basis for your production cost."},
    {k:"spec",  t:"Product Specification", p:"Translate each prioritised need into a concrete, measurable specification."},
    {k:"fin",   t:"Financial Plan", p:"Drive the numbers: price, production cost, operating costs and headcount across the years."},
    {k:"res",   t:"Results & Prediction", p:"The synthesised multi-year P&L: revenue, gross margin, OPEX, EBITDA and the path to profit."}
  ];
  const cur=STEPS[step];

  /* --- assumption helpers --- */
  const addAssum=()=>setModel(m=>({...m,assumptions:[...m.assumptions,{id:Date.now(),text:"",cat:"Market",amount:"",validated:false,comments:""}]}));
  const setAssum=(id,k,v)=>setModel(m=>({...m,assumptions:m.assumptions.map(a=>a.id===id?{...a,[k]:v}:a)}));
  const delAssum=(id)=>setModel(m=>({...m,assumptions:m.assumptions.filter(a=>a.id!==id)}));

  /* --- io --- */
  const reset=()=>{if(confirm("Reset everything to the example case?"))setModel(clone(SEED));};
  const exportJSON=()=>{const b=new Blob([JSON.stringify(model,null,2)],{type:"application/json"});const a=document.createElement("a");
    a.href=URL.createObjectURL(b);a.download=(model.meta.name||"case").replace(/\s+/g,"_")+".case.json";a.click();};
  const importJSON=(e)=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{setModel(JSON.parse(rd.result));}catch(x){alert("Invalid file");}};rd.readAsText(f);e.target.value="";};

  /* --- segment / list mutators --- */
  const setSeg=(i,k,v)=>setModel(m=>{const c=clone(m);c.opportunity.segments[i][k]=v;return c;});
  const setSegYear=(i,k,j,v)=>setModel(m=>{const c=clone(m);c.opportunity.segments[i][k]=pad(c.opportunity.segments[i][k],N);c.opportunity.segments[i][k][j]=v;return c;});
  const addSeg=()=>setModel(m=>{const c=clone(m);c.opportunity.segments.push({name:"New segment",tam:Array(N).fill(0),reach:Array(N).fill(0)});return c;});
  const delSeg=(i)=>setModel(m=>{const c=clone(m);c.opportunity.segments.splice(i,1);return c;});
  const setFin=(k,j,v)=>setModel(m=>{const c=clone(m);c.finance[k]=pad(c.finance[k],N);c.finance[k][j]=v;return c;});
  const setFse=(name,j,v)=>setModel(m=>{const c=clone(m);c.finance.fse[name]=pad(c.finance.fse[name],N);c.finance.fse[name][j]=v;return c;});

  const compTotal=model.concept.components.reduce((a,c)=>a+(+c.cost||0),0);

  return (
   <div className="wrap">
    <div className="topbar">
      <div className="brand"><span className="pp">~/</span> business case builder
        <small>idea → market → costs → financial prediction · structure from the 360 business-case template</small></div>
      <div className="spacer"></div>
      <label className="btn" style={{cursor:"pointer"}}>import<input type="file" accept="application/json" onChange={importJSON} style={{display:"none"}}/></label>
      <button className="btn" onClick={exportJSON}>export</button>
      <button className="btn" onClick={reset}>reset</button>
    </div>

    <div className="idea">
      <input className="name" value={model.meta.name} onChange={e=>upd("meta.name",e.target.value)} placeholder="Venture / project name"/>
      <input className="tag" value={model.meta.tagline} onChange={e=>upd("meta.tagline",e.target.value)} placeholder="One line describing the idea"/>
    </div>

    <div className="stepper">
      {STEPS.map((s,i)=>(
        <button key={s.k} className={"stp"+(i===step?" on":"")} onClick={()=>setStep(i)}>
          <span className="num">{i+1}</span>{s.t}
        </button>
      ))}
    </div>
    <div className="progress"><i style={{width:((step+1)/STEPS.length*100)+"%"}}></i></div>

    <div className="stephead"><span className="k">STEP {step+1}/{STEPS.length}</span>{cur.t}</div>
    <div className="purpose">{cur.p}</div>

    {/* ---------------- STEP 1: FUNDAMENTALS ---------------- */}
    {step===0 && <>
      <div className="block">
        <h3>◇ Problem <Help tip="State the problem before the solution. If you can't make the pain vivid, the rest of the case is built on sand."/></h3>
        <label className="fld">What is the problem?</label>
        <textarea value={model.fundamentals.problemWhat} onChange={e=>upd("fundamentals.problemWhat",e.target.value)}/>
        <div className="grid2">
          <div><label className="fld">Why is it a problem?</label>
            <textarea value={model.fundamentals.problemWhy} onChange={e=>upd("fundamentals.problemWhy",e.target.value)}/></div>
          <div><label className="fld">Who has this problem?</label>
            <textarea value={model.fundamentals.problemWho} onChange={e=>upd("fundamentals.problemWho",e.target.value)}/></div>
        </div>
      </div>
      <div className="block">
        <h3>✦ Solution <Help tip="The high-level solution and the unfair advantage — what you have that competitors can't easily copy." eg="a calibrated multi-gas sensor at a hardware-only price."/></h3>
        <label className="fld">High-level solution</label>
        <textarea value={model.fundamentals.solution} onChange={e=>upd("fundamentals.solution",e.target.value)}/>
        <label className="fld">Unfair advantage</label>
        <textarea value={model.fundamentals.unfairAdvantage} onChange={e=>upd("fundamentals.unfairAdvantage",e.target.value)}/>
      </div>
      <div className="block">
        <h3>→ Go-to-market <Help tip="Customer segments (and the early adopters within them), plus how you reach and distribute to them."/></h3>
        <table className="dt"><thead><tr><th className="l">Customer segment</th><th className="l">Early adopters</th><th></th></tr></thead>
          <tbody>{model.fundamentals.segments.map((s,i)=>(
            <tr key={i}>
              <td className="l"><input className="l" value={s.name} onChange={e=>{const c=clone(model);c.fundamentals.segments[i].name=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.early} onChange={e=>{const c=clone(model);c.fundamentals.segments[i].early=e.target.value;setModel(c);}}/></td>
              <td><button className="xbtn" onClick={()=>{const c=clone(model);c.fundamentals.segments.splice(i,1);setModel(c);}}>×</button></td>
            </tr>))}</tbody></table>
        <button className="btn addrow" onClick={()=>{const c=clone(model);c.fundamentals.segments.push({name:"",early:""});setModel(c);}}>+ segment</button>
        <label className="fld">Distribution channels</label>
        <textarea value={model.fundamentals.channels} onChange={e=>upd("fundamentals.channels",e.target.value)}/>
      </div>
      <div className="block">
        <h3>€ Revenue model <Help tip="The streams that will turn the value into money. You'll quantify these in the Financial Plan." eg="device sale (one-off) + monitoring subscription (recurring)."/></h3>
        <table className="dt"><thead><tr><th className="l">Stream</th><th className="l">Description</th><th className="l">Applies to</th><th></th></tr></thead>
          <tbody>{model.fundamentals.revenueStreams.map((s,i)=>(
            <tr key={i}>
              <td className="l"><input className="l" value={s.name} onChange={e=>{const c=clone(model);c.fundamentals.revenueStreams[i].name=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.desc} onChange={e=>{const c=clone(model);c.fundamentals.revenueStreams[i].desc=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.seg} onChange={e=>{const c=clone(model);c.fundamentals.revenueStreams[i].seg=e.target.value;setModel(c);}}/></td>
              <td><button className="xbtn" onClick={()=>{const c=clone(model);c.fundamentals.revenueStreams.splice(i,1);setModel(c);}}>×</button></td>
            </tr>))}</tbody></table>
        <button className="btn addrow" onClick={()=>{const c=clone(model);c.fundamentals.revenueStreams.push({name:"",desc:"",seg:""});setModel(c);}}>+ stream</button>
      </div>
    </>}

    {/* ---------------- STEP 2: STAKEHOLDERS ---------------- */}
    {step===1 && <>
      <div className="block">
        <h3>◧ Stakeholders <Help tip="Everyone who influences or is affected by the decision — not just the buyer. Map them before scoring needs."/></h3>
        <table className="dt"><thead><tr><th className="l">Stakeholder</th><th className="l">Description</th><th></th></tr></thead>
          <tbody>{model.stakeholders.map((s,i)=>(
            <tr key={i}><td className="l"><input className="l" value={s.name} onChange={e=>{const c=clone(model);c.stakeholders[i].name=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.desc} onChange={e=>{const c=clone(model);c.stakeholders[i].desc=e.target.value;setModel(c);}}/></td>
              <td><button className="xbtn" onClick={()=>{const c=clone(model);c.stakeholders.splice(i,1);setModel(c);}}>×</button></td></tr>))}</tbody></table>
        <button className="btn addrow" onClick={()=>{const c=clone(model);c.stakeholders.push({name:"",desc:""});setModel(c);}}>+ stakeholder</button>
      </div>
      <div className="block">
        <h3>! Pains & needs <Help tip="Each need scored by priority 1–9 (House of Quality style). High-priority needs should drive your product specs later." eg="'live visibility' scored 9 for the facility manager."/></h3>
        <div className="scrollx"><table className="dt"><thead><tr><th className="l">Need</th><th className="l">Description</th><th className="l">Stakeholder</th><th>Priority</th><th></th></tr></thead>
          <tbody>{model.needs.map((s,i)=>(
            <tr key={i}><td className="l"><input className="l" value={s.name} onChange={e=>{const c=clone(model);c.needs[i].name=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.desc} onChange={e=>{const c=clone(model);c.needs[i].desc=e.target.value;setModel(c);}}/></td>
              <td className="l"><input className="l" value={s.stk} onChange={e=>{const c=clone(model);c.needs[i].stk=e.target.value;setModel(c);}}/></td>
              <td><input type="number" min="1" max="9" value={s.priority} onChange={e=>{const c=clone(model);c.needs[i].priority=+e.target.value;setModel(c);}}/></td>
              <td><button className="xbtn" onClick={()=>{const c=clone(model);c.needs.splice(i,1);setModel(c);}}>×</button></td></tr>))}</tbody></table></div>
        <button className="btn addrow" onClick={()=>{const c=clone(model);c.needs.push({name:"",desc:"",stk:"",priority:5});setModel(c);}}>+ need</button>
      </div>
      <div className="block">
        <h3>⊟ Competitor analysis <Help tip="Score how each alternative meets the same criteria (1–9). Where they score low and you score high is your wedge." /></h3>
        <div className="scrollx"><table className="dt"><thead><tr><th className="l">Criterion</th>{model.competitors.cols.map((c,j)=><th key={j} className="l">{c}</th>)}</tr></thead>
          <tbody>{model.competitors.rows.map((rw,i)=>(
            <tr key={i}><td className="l rowlab">{rw}</td>
              {model.competitors.cols.map((c,j)=>(
                <td key={j} className="l"><input className="l" value={(model.competitors.data[rw]||[])[j]||""} onChange={e=>{const cc=clone(model);cc.competitors.data[rw]=pad(cc.competitors.data[rw]||[],model.competitors.cols.length,"");cc.competitors.data[rw][j]=e.target.value;setModel(cc);}}/></td>
              ))}</tr>))}</tbody></table></div>
      </div>
    </>}

    {/* ---------------- STEP 3: OPPORTUNITY SIZE ---------------- */}
    {step===2 && <>
      <div className="block">
        <h3>⌗ Horizon & price <Help tip="The price per unit feeds revenue directly. Years and start year set every table in the model." eg="€600 per device, 5 years from 2026."/></h3>
        <div className="grid3">
          <div><label className="fld">Price per unit (€)</label><input className="txt" type="number" value={model.opportunity.pricePerUnit} onChange={e=>upd("opportunity.pricePerUnit",+e.target.value)}/></div>
          <div><label className="fld">Start year</label><input className="txt" type="number" value={model.meta.startYear} onChange={e=>upd("meta.startYear",+e.target.value)}/></div>
          <div><label className="fld"># Years (1–10)</label><input className="txt" type="number" min="1" max="10" value={model.meta.years} onChange={e=>upd("meta.years",Math.max(1,Math.min(10,+e.target.value)))}/></div>
        </div>
      </div>
      <div className="block">
        <h3>▦ TAM — addressable units by segment & year <Help tip="Total Addressable Market in units. One row per country/segment; enter how many units the whole market represents each year." /></h3>
        <div className="scrollx"><table className="dt"><thead><YearHeader yrs={r.yrs}/></thead>
          <tbody>
          {model.opportunity.segments.map((s,i)=>(
            <tr key={i}><td className="l"><input className="l" value={s.name} onChange={e=>setSeg(i,"name",e.target.value)} style={{minWidth:130}}/></td>
              {pad(s.tam,N).map((v,j)=><td key={j}><input type="number" value={v} onChange={e=>setSegYear(i,"tam",j,+e.target.value)}/></td>)}
            </tr>))}
            <YearRow label="TAM total (units)" n={N} calc arr={r.yrs.map((y,t)=>r.segs.reduce((a,s)=>a+(+s.tam[t]||0),0))}/>
            <YearRow label="TAM (€)" n={N} calc money arr={r.yrs.map((y,t)=>r.segs.reduce((a,s)=>a+(+s.tam[t]||0),0)*(+model.opportunity.pricePerUnit||0))}/>
          </tbody></table></div>
        <button className="btn addrow" onClick={addSeg}>+ segment</button>
        {model.opportunity.segments.length>1 && <button className="btn addrow" style={{marginLeft:8}} onClick={()=>delSeg(model.opportunity.segments.length-1)}>– remove last</button>}
      </div>
      <div className="block">
        <h3>◎ SOM — expected market reach (%) <Help tip="Serviceable Obtainable Market: the % of each segment's units you realistically capture each year. Units sold = TAM × this %." eg="1.5% of Portugal in year 1, ramping to 9% by year 5."/></h3>
        <div className="scrollx"><table className="dt"><thead><YearHeader yrs={r.yrs}/></thead>
          <tbody>
          {model.opportunity.segments.map((s,i)=>(
            <tr key={i}><td className="l rowlab" style={{minWidth:130}}>{s.name||("Segment "+(i+1))}</td>
              {pad(s.reach,N).map((v,j)=><td key={j}><input type="number" step="0.1" value={v} onChange={e=>setSegYear(i,"reach",j,+e.target.value)}/></td>)}
            </tr>))}
            <YearRow label="Units sold (#)" n={N} calc arr={r.rows.map(x=>x.units)}/>
            <YearRow label="Reach (€)" n={N} calc money arr={r.rows.map(x=>x.revenue)}/>
          </tbody></table></div>
      </div>
    </>}

    {/* ---------------- STEP 4: CONCEPT & COSTS ---------------- */}
    {step===3 && <>
      <div className="block">
        <h3>◳ Concept <Help tip="A short description of the thing you're building. In the Excel this is where the concept image goes."/></h3>
        <textarea value={model.concept.description} onChange={e=>upd("concept.description",e.target.value)}/>
      </div>
      <div className="block">
        <h3>⊞ Cost breakdown <Help tip="Bill of materials by component & module. Their sum is a bottom-up reference for the production cost per unit you set in the Financial Plan." /></h3>
        <table className="dt"><thead><tr><th className="l">Component</th><th className="l">Module</th><th>Unit cost (€)</th><th></th></tr></thead>
          <tbody>{model.concept.components.map((c,i)=>(
            <tr key={i}><td className="l"><input className="l" value={c.name} onChange={e=>{const cc=clone(model);cc.concept.components[i].name=e.target.value;setModel(cc);}}/></td>
              <td className="l"><select value={c.module} onChange={e=>{const cc=clone(model);cc.concept.components[i].module=e.target.value;setModel(cc);}}>
                <option>Hardware</option><option>Software</option><option>Service</option></select></td>
              <td><input type="number" value={c.cost} onChange={e=>{const cc=clone(model);cc.concept.components[i].cost=+e.target.value;setModel(cc);}}/></td>
              <td><button className="xbtn" onClick={()=>{const cc=clone(model);cc.concept.components.splice(i,1);setModel(cc);}}>×</button></td></tr>))}
            <tr className="total"><td className="l">Total component cost</td><td></td><td className="calc">{eurF(compTotal)}</td><td></td></tr>
          </tbody></table>
        <button className="btn addrow" onClick={()=>{const cc=clone(model);cc.concept.components.push({name:"",cost:0,module:"Hardware"});setModel(cc);}}>+ component</button>
        <div className="note">Components total <b style={{color:"var(--accent)"}}>{eurF(compTotal)}</b> — currently your production cost per unit is set to {eurF(model.finance.productionCostPerUnit)} (Financial Plan).</div>
      </div>
    </>}

    {/* ---------------- STEP 5: PRODUCT SPEC ---------------- */}
    {step===4 && <>
      <div className="block">
        <h3>▤ Specifications <Help tip="Turn each high-priority need into a concrete, measurable target. This is the bridge from customer pain to engineering." eg="need 'live visibility' → spec 'CO₂ accuracy ±30 ppm'."/></h3>
        <div className="scrollx"><table className="dt"><thead><tr><th className="l">Specification</th><th className="l">Component</th><th className="l">Target value</th><th className="l">Related need</th><th></th></tr></thead>
          <tbody>{model.specs.map((s,i)=>(
            <tr key={i}><td className="l"><input className="l" value={s.name} onChange={e=>{const c=clone(model);c.specs[i].name=e.target.value;setModel(c);}}/></td>
              <td className="l"><select value={s.component} onChange={e=>{const c=clone(model);c.specs[i].component=e.target.value;setModel(c);}}><option>Hardware</option><option>Software</option><option>Service</option></select></td>
              <td className="l"><input className="l" value={s.target} onChange={e=>{const c=clone(model);c.specs[i].target=e.target.value;setModel(c);}}/></td>
              <td className="l"><select value={s.need} onChange={e=>{const c=clone(model);c.specs[i].need=e.target.value;setModel(c);}}>
                <option value="">—</option>{model.needs.map((nd,j)=><option key={j} value={nd.name}>{nd.name}</option>)}</select></td>
              <td><button className="xbtn" onClick={()=>{const c=clone(model);c.specs.splice(i,1);setModel(c);}}>×</button></td></tr>))}</tbody></table></div>
        <button className="btn addrow" onClick={()=>{const c=clone(model);c.specs.push({name:"",component:"Hardware",target:"",need:""});setModel(c);}}>+ specification</button>
      </div>
    </>}

    {/* ---------------- STEP 6: FINANCIAL PLAN ---------------- */}
    {step===5 && <>
      <div className="block">
        <h3>€ Unit economics <Help tip="Price comes from Opportunity Size. Production cost per unit drives COGS — sense-check it against the component breakdown in step 4." /></h3>
        <div className="grid3">
          <div><label className="fld">Price per unit (€)</label><input className="txt" type="number" value={model.opportunity.pricePerUnit} onChange={e=>upd("opportunity.pricePerUnit",+e.target.value)}/></div>
          <div><label className="fld">Production cost / unit (€)</label><input className="txt" type="number" value={model.finance.productionCostPerUnit} onChange={e=>upd("finance.productionCostPerUnit",+e.target.value)}/></div>
          <div><label className="fld">Gross margin / unit</label><input className="txt" disabled value={eurF((+model.opportunity.pricePerUnit||0)-(+model.finance.productionCostPerUnit||0))}/></div>
        </div>
      </div>
      <div className="block">
        <h3>▦ FSE — external supplies & services (€/yr) <Help tip="Operating costs that aren't people: rent, marketing, travel, etc. The 360 template calls these FSEs." /></h3>
        <div className="scrollx"><table className="dt"><thead><YearHeader yrs={r.yrs}/></thead>
          <tbody>
          {Object.keys(model.finance.fse).map(name=>(
            <YearRow key={name} label={name} n={N} arr={model.finance.fse[name]} onChange={(j,v)=>setFse(name,j,v)} />
          ))}
          <YearRow label="FSE total" n={N} calc money arr={r.rows.map(x=>x.fse)}/>
          </tbody></table></div>
      </div>
      <div className="block">
        <h3>◧ Personnel (€/yr) <Help tip="Headcount × cost/person, plus outsourcing × cost/person. Together with FSEs this makes OPEX." /></h3>
        <div className="scrollx"><table className="dt"><thead><YearHeader yrs={r.yrs}/></thead>
          <tbody>
          <YearRow label="# Headcount" n={N} arr={model.finance.headcount} onChange={(j,v)=>setFin("headcount",j,v)}/>
          <YearRow label="Cost / headcount (€)" n={N} arr={model.finance.costHeadcount} onChange={(j,v)=>setFin("costHeadcount",j,v)}/>
          <YearRow label="# Outsourcing" n={N} arr={model.finance.outsourcing} onChange={(j,v)=>setFin("outsourcing",j,v)}/>
          <YearRow label="Cost / outsourcing (€)" n={N} arr={model.finance.costOutsourcing} onChange={(j,v)=>setFin("costOutsourcing",j,v)}/>
          <YearRow label="Personnel total" n={N} calc money arr={r.rows.map(x=>x.pers)}/>
          <YearRow label="OPEX (FSE + personnel)" n={N} calc money arr={r.rows.map(x=>x.opex)}/>
          </tbody></table></div>
      </div>
    </>}

    {/* ---------------- STEP 7: RESULTS ---------------- */}
    {step===6 && <>
      <div className="kpis">
        <div className="kpi"><div className="lbl">Revenue · {r.yrs[N-1]}</div><div className="val">{eur(r.revLast)}</div><div className="sub">{r.revCagr!=null?("CAGR "+r.revCagr.toFixed(0)+"%"):"—"}</div></div>
        <div className="kpi"><div className="lbl">Gross margin</div><div className="val">{r.gmPctLast.toFixed(0)}%</div><div className="sub">final year</div></div>
        <div className="kpi"><div className="lbl">EBITDA breakeven</div><div className={"val"+(r.breakeven?"":" neg")}>{r.breakeven||"none"}</div><div className="sub">{r.breakeven?"first profitable year":"not within horizon"}</div></div>
        <div className="kpi"><div className="lbl">Cumulative EBITDA</div><div className={"val"+(r.cumEbitda<0?" neg":"")}>{eur(r.cumEbitda)}</div><div className="sub">{r.cumBreak?("cash-positive by "+r.cumBreak):("low "+eur(r.minCum))}</div></div>
      </div>
      <div className="chartbox">
        <div className="legend">
          <span><i style={{background:"#7DE38D"}}></i>revenue</span>
          <span><i style={{background:"#4ecdc4"}}></i>gross margin</span>
          <span><i style={{background:"#ffd166"}}></i>EBITDA</span>
          <span><i style={{background:"#c792ea"}}></i>cumulative EBITDA</span>
        </div>
        <Chart r={r}/>
      </div>
      <div className="block">
        <h3>▤ Projected P&amp;L</h3>
        <div className="scrollx"><table className="dt"><thead><YearHeader yrs={r.yrs}/></thead>
          <tbody>
            <YearRow label="Units sold" n={N} calc arr={r.rows.map(x=>x.units)}/>
            <YearRow label="Revenue" n={N} calc money arr={r.rows.map(x=>x.revenue)}/>
            <YearRow label="COGS" n={N} calc money arr={r.rows.map(x=>-x.cogs)}/>
            <YearRow label="Gross margin" n={N} calc money arr={r.rows.map(x=>x.gm)}/>
            <YearRow label="OPEX" n={N} calc money arr={r.rows.map(x=>-x.opex)}/>
            <YearRow label="EBITDA" n={N} calc money arr={r.rows.map(x=>x.ebitda)}/>
            <YearRow label="Cumulative EBITDA" n={N} calc money arr={r.rows.map(x=>x.cum)}/>
          </tbody></table></div>
        <div className="note">This is a directional EBITDA model (it stops at EBITDA, like the 360 template — no depreciation, tax, working capital or financing). Use it to sense-check the shape of the business, then drop in your detailed plan to compare.</div>
      </div>
    </>}

    <div className="navbtns">
      <button className="btn" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>‹ back</button>
      <button className="btn primary" onClick={()=>setStep(s=>Math.min(STEPS.length-1,s+1))} disabled={step===STEPS.length-1}>{step===STEPS.length-2?"see results ›":"next ›"}</button>
    </div>

    {/* ---------------- FLOATING ASSUMPTIONS ---------------- */}
    <button className="fab" onClick={()=>setDrawer(true)}>⚑ assumptions <span className="cnt">{model.assumptions.length}</span></button>
    {drawer && <>
      <div className="drawer-bg" onClick={()=>setDrawer(false)}></div>
      <div className="drawer">
        <header><span className="t">⚑ Assumptions</span>
          <span className="note" style={{margin:0}}>{model.assumptions.filter(a=>a.validated).length}/{model.assumptions.length} validated</span>
          <button className="x" onClick={()=>setDrawer(false)}>×</button></header>
        <div className="body">
          <div className="intro">Every number in this case rests on assumptions. Capture them here as you go — categorise, note the value you used, and mark whether you've validated it. This panel stays with you across all steps.</div>
          {model.assumptions.map(a=>(
            <div className="acard" key={a.id}>
              <div className="top">
                <span className={"badge "+a.cat.toLowerCase()}>{a.cat}</span>
                <button className="xbtn" style={{marginLeft:"auto"}} onClick={()=>delAssum(a.id)}>×</button>
              </div>
              <textarea value={a.text} placeholder="State the assumption…" onChange={e=>setAssum(a.id,"text",e.target.value)}/>
              <div className="meta">
                <select value={a.cat} onChange={e=>setAssum(a.id,"cat",e.target.value)}>
                  <option>Market</option><option>Costs</option><option>Competitors</option><option>Other</option></select>
                <input className="txt" placeholder="value used (e.g. 12%, €420)" value={a.amount} onChange={e=>setAssum(a.id,"amount",e.target.value)}/>
                <label className="chk"><input type="checkbox" checked={a.validated} onChange={e=>setAssum(a.id,"validated",e.target.checked)}/>validated</label>
              </div>
              <input className="txt" style={{marginTop:8}} placeholder="comments / source" value={a.comments} onChange={e=>setAssum(a.id,"comments",e.target.value)}/>
            </div>
          ))}
          <button className="btn" onClick={addAssum}>+ add assumption</button>
        </div>
      </div>
    </>}

   </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
