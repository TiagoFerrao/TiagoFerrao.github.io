<!DOCTYPE html>
<html lang="en" data-theme="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#001a20">
  <title>CV | Tiago Ferrão</title>
  <meta name="description" content="Curriculum Vitae of Tiago Ferrão — Innovation Director, Engineering · Data Science · AI · Strategy">
  <link rel="icon" href="img/bee.png">
  <link rel="apple-touch-icon" href="img/bee.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/responsive.css?v=2">
  <link rel="stylesheet" href="css/cv.css?v=2">
</head>

<body>
  <!-- ============================================
       HEADER — injected by js/header.js
       ============================================ -->
  <header id="site-header"></header>

  <!-- ============================================
       MAIN — page content
       ============================================ -->
  <main>
    <div class="container">

      <!-- 1. Identity / Header card -->
      <section id="cv-identity" class="cv-identity fade-in"></section>

      <!-- 2. Executive Summary -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Executive Summary</h3>
        <div id="cv-summary" class="section-intro"></div>
      </section>

      <!-- 3. Core Competencies -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Core Competencies</h3>
        <div id="cv-competencies" class="competency-grid"></div>
      </section>

      <!-- 4. Professional Experience -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Professional Experience</h3>
        <div id="cv-experience" class="cv-experience-list"></div>
      </section>

      <!-- 5. Education -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Education</h3>
        <div id="cv-education" class="card-grid"></div>
      </section>

      <!-- 6. Recognition & Institutional Roles -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Recognition &amp; Institutional Roles</h3>
        <div id="cv-recognition"></div>
      </section>

      <!-- 7. Publications -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Publications</h3>
        <div id="cv-publications"></div>
      </section>

      <!-- 8. Languages -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Languages</h3>
        <div id="cv-languages" class="languages-row"></div>
      </section>

      <!-- 9. Additional Training -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Additional Training &amp; Certifications</h3>
        <div id="cv-additional-training"></div>
      </section>

      <!-- 10. Other -->
      <section class="cv-section fade-in">
        <h3 class="cv-section-title">Other</h3>
        <div id="cv-other"></div>
      </section>

    </div>
  </main>

  <!-- ============================================
       FOOTER — injected by js/footer.js
       ============================================ -->
  <footer id="site-footer"></footer>

  <!-- ============================================
       THEME TOGGLE — injected by js/theme-toggle.js (handler in js/main.js)
       ============================================ -->
  <button id="theme-toggle"></button>

  <!-- CV data + renderer, then site-wide main.js (which handles fade-ins) -->
  <script src="js/cv-data.js"></script>
  <script src="js/cv-render.js"></script>
  <!-- ============================================
       SCRIPTS
       ============================================ -->
  <script src="js/header.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
