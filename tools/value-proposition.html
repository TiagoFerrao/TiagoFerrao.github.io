<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Value Proposition Canvas — ferrao.me</title>
<meta name="theme-color" content="#001a20">
<meta name="description" content="Map customer jobs, pains and gains, then design products that fit — and see why they're valuable.">
<link rel="icon" href="../img/bee.png">
<link rel="apple-touch-icon" href="../img/bee.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#001a20; --bg-2:#002a33; --panel:rgba(0,50,60,.55); --panel-2:rgba(0,42,51,.92);
    --accent:#7DE38D; --accent-rgb:125,227,141; --accent-2:#288f5b;
    --text:#e0f0e8; --dim:#8fb8a0; --mut:#5a8a70;
    --border:rgba(125,227,141,.18); --border-strong:rgba(125,227,141,.4);
    --amber:#ffd166; --info:#4ecdc4; --red:#e07a6b;
    --mono:'Inconsolata',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  button{font-family:inherit;-webkit-appearance:none;appearance:none;}
  body{font-family:var(--disp);background:radial-gradient(1100px 560px at 82% -10%,rgba(125,227,141,.06),transparent 60%),var(--bg);color:var(--text);font-size:15px;line-height:1.5;}
  a{color:var(--accent);}
  .wrap{max-width:1120px;margin:0 auto;padding:20px 20px 70px;}
  .site-back{display:inline-block;font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:var(--dim);text-decoration:none;margin-bottom:14px;}
  .site-back:hover{color:var(--accent);}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:13px;margin-bottom:14px;}
  .brand{font-family:var(--disp);font-weight:700;font-size:18px;}
  .brand .pp{color:var(--accent);text-shadow:0 0 10px rgba(var(--accent-rgb),.4);}
  .brand small{display:block;font-family:var(--mono);font-weight:400;font-size:12px;color:var(--dim);}
  .topbar .sp{flex:1}
  .btn{font-family:var(--mono);font-size:12.5px;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 11px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block;}
  .btn:hover{color:var(--accent);border-color:var(--border-strong);}
  .btn.primary{color:var(--bg);background:var(--accent);border-color:var(--accent);font-weight:700;}
  .btn.primary:hover{filter:brightness(1.08);}

  /* segment */
  .seg{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
  .seg .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
  .seg input,.seg textarea{width:100%;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--disp);font-size:14px;padding:8px 10px;}
  .seg input.name{font-size:17px;font-weight:600;font-family:var(--disp);}
  .seg textarea{resize:vertical;min-height:42px;margin-top:8px;font-size:13px;}
  .seg input:focus,.seg textarea:focus{outline:none;border-color:var(--border-strong);}
  .seg .hint{font-size:11px;color:var(--mut);margin-top:6px;}

  /* order banner */
  .order{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-bottom:16px;}
  .order .step{background:transparent;border:1px solid var(--border);border-radius:20px;padding:4px 11px;cursor:pointer;color:var(--dim);font-family:var(--mono);font-size:11.5px;transition:color .15s,border-color .15s,background .15s;}
  .order .step.cust{border-color:rgba(78,205,196,.4);color:#7fcabf;} .order .step.val{border-color:rgba(125,227,141,.35);color:#8fce9c;}
  .order .step:hover{color:var(--text);border-color:var(--accent);}
  .order .step.on{background:rgba(var(--accent-rgb),.16);color:var(--accent);border-color:var(--accent);font-weight:600;box-shadow:0 0 10px rgba(var(--accent-rgb),.12);}
  .order .arr{color:var(--mut);}
  .order .lab{color:var(--mut);text-transform:uppercase;letter-spacing:.1em;font-size:10px;margin-right:2px;}

  .fitbar{flex:1;min-width:160px;}
  .fitbar .ft{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:4px;}
  .fitbar .bar{height:7px;background:rgba(0,0,0,.25);border-radius:5px;overflow:hidden;}
  .fitbar .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));transition:width .4s;}

  /* diagram */
  .canvas{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:10px 8px;overflow-x:auto;margin-bottom:16px;}
  svg.vpc{display:block;width:100%;max-width:980px;min-width:660px;margin:0 auto;}
  .zone{cursor:pointer;transition:fill .25s,stroke .25s;}
  .zone .zbg{fill:var(--panel-2);stroke:var(--border-strong);stroke-width:1.5;transition:fill .25s,stroke .25s;}
  .zone:hover .zbg{fill:rgba(125,227,141,.12);}
  .zone.on .zbg{fill:rgba(125,227,141,.22);stroke:var(--accent);stroke-width:2.5;}
  .zone.pair .zbg{fill:rgba(125,227,141,.10);stroke:var(--accent);stroke-dasharray:5 4;stroke-width:2;}
  .zlab{font-family:var(--mono);fill:var(--text);text-anchor:middle;pointer-events:none;}
  .zcount{font-family:var(--mono);font-size:11px;fill:var(--accent);text-anchor:middle;pointer-events:none;}
  .ztitle{font-family:var(--mono);font-size:11px;letter-spacing:.18em;fill:var(--dim);text-anchor:middle;}
  .wheel{transition:transform .55s cubic-bezier(.4,0,.2,1);transform-box:view-box;transform-origin:240px 240px;}
  .lblg{transition:transform .55s cubic-bezier(.4,0,.2,1);transform-box:view-box;}
  .conn{stroke:var(--accent);stroke-width:1.5;stroke-dasharray:4 5;opacity:0;transition:opacity .3s;}
  .conn.show{opacity:.7;}

  /* editor + explain */
  .below{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-bottom:18px;}
  @media(max-width:860px){.below{grid-template-columns:1fr;}}
  .explain,.editor{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .explain{border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;}
  .explain .ey{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .explain h2{font-size:1.05rem;margin-bottom:4px;}
  .explain .seq{font-family:var(--mono);font-size:11px;color:var(--mut);margin-bottom:8px;}
  .explain p{font-size:.87rem;line-height:1.6;color:var(--text);}
  .explain .fitq{margin-top:12px;padding:9px 12px;background:rgba(125,227,141,.1);border-radius:8px;font-size:.8rem;line-height:1.5;color:var(--accent);font-family:var(--mono);}
  .editor .et{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
  .it{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
  .it .star{background:transparent;border:none;cursor:pointer;font-size:15px;color:var(--mut);line-height:1.4;}
  .it .star.on{color:var(--amber);}
  .it input.t{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--disp);font-size:13.5px;padding:7px 9px;}
  .it input.t:focus{outline:none;border-color:var(--border-strong);}
  .it .del{background:transparent;border:none;color:var(--mut);cursor:pointer;font-size:15px;}
  .it .del:hover{color:var(--red);}
  .links{margin:2px 0 8px 24px;display:flex;flex-wrap:wrap;gap:5px;}
  .links .lk{font-size:11px;font-family:var(--mono);border:1px solid var(--border);border-radius:20px;padding:2px 9px;cursor:pointer;color:var(--mut);}
  .links .lk.on{background:rgba(125,227,141,.18);border-color:var(--accent);color:var(--accent);}
  .links .none{font-size:11px;color:var(--mut);font-style:italic;}
  .addrow{display:flex;gap:8px;margin-top:6px;}
  .addrow input{flex:1;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.86rem;padding:9px 11px;font-family:var(--disp);}
  .addrow input:focus{outline:none;border-color:var(--border-strong);}
  .empty{font-size:.8rem;color:var(--mut);font-style:italic;padding:4px 0 10px;}

  /* deliverable */
  .vp{background:var(--panel-2);border:1px solid var(--border-strong);border-radius:var(--radius);padding:20px 22px;}
  .vp h3{font-family:var(--disp);font-size:1.15rem;margin-bottom:4px;}
  .vphead{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;}
  .vphead h3{margin-bottom:0;}
  .vchev{font-family:var(--mono);color:var(--accent);transition:transform .2s;display:inline-block;font-size:.9rem;}
  .vp.open .vchev{transform:rotate(90deg);}
  .vpstatus{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);white-space:nowrap;}
  .vptoggle{margin-left:auto;flex-shrink:0;}
  .vpbody{margin-top:16px;}
  .vp .vsub{font-size:12px;color:var(--dim);margin-bottom:14px;}
  .vp .stmt{font-size:1rem;line-height:1.7;color:var(--text);background:rgba(0,0,0,.16);border-left:2px solid var(--accent);padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:16px;}
  .vp .stmt b{color:var(--accent);}
  .vcols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
  @media(max-width:760px){.vcols{grid-template-columns:1fr;}}
  .vcol h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:7px;}
  .vcol ul{list-style:none;}
  .vcol li{font-size:13px;color:var(--text);padding:3px 0;border-bottom:1px solid rgba(125,227,141,.06);}
  .vcol li.gap{color:var(--mut);}
  .vcol .none{font-size:12px;color:var(--mut);font-style:italic;}
  .gaps{font-size:12.5px;color:var(--dim);background:rgba(224,122,107,.08);border:1px solid rgba(224,122,107,.25);border-radius:8px;padding:10px 12px;}
  .gaps b{color:var(--red);}
  .gaps .g{display:inline-block;margin:2px 6px 2px 0;}
  .doctools{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .note{font-size:11.5px;color:var(--mut);margin-top:10px;}

  @page{ size:A4 portrait; margin:14mm; }
  @media print{
    body *{visibility:hidden;}
    #vp, #vp *{visibility:visible;}
    #vp{position:absolute;left:0;top:0;width:100%;background:#fff;border:none;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    #vp h3,#vp .vcol li{color:#111;} #vp .vsub,#vp .vcol li.gap{color:#555;}
    #vp h4,#vp .stmt b,#vp .vcol{color:#1c6b41;} #vp .stmt{color:#111;border-left-color:#1c6b41;background:#f4f8f5;}
    .doctools,.note{display:none;}
  }
  /* shared business-case selector bar (projects.js) */
  #project-bar:empty{display:none}
  .fp-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;position:relative;}
  .fp-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}
  .fp-select{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--border-strong);border-radius:8px;padding:7px 12px;cursor:pointer;color:var(--text);}
  .fp-name{font-weight:650;font-size:.9rem;color:var(--accent);}
  .fp-chev{color:var(--dim);font-family:var(--mono);font-size:.7rem;}
  .fp-actions{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap;}
  .fp-btn{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;}
  .fp-btn:hover{color:var(--text);background:var(--panel-2);}
  .fp-btn.fp-danger{border-color:rgba(224,122,107,.4);color:var(--red);}
  .fp-ex-tag{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border:1px solid var(--border-strong);border-radius:5px;padding:1px 5px;}
  .fp-dd{position:absolute;top:calc(100% - 6px);left:14px;z-index:40;margin-top:8px;min-width:280px;max-width:380px;background:var(--panel-2);border:1px solid var(--border-strong);border-radius:10px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5);}
  .fp-dd-item{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:10px 14px;border:none;border-bottom:1px solid var(--border);background:transparent;cursor:pointer;}
  .fp-dd-item:hover{background:rgba(125,227,141,.06);}
  .fp-dd-item.fp-on{background:rgba(125,227,141,.10);}
  .fp-di-name{font-size:.86rem;color:var(--text);}
  .fp-dd-item.fp-on .fp-di-name{color:var(--accent);font-weight:650;}
  .fp-di-ex{font-family:var(--mono);font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);border:1px solid var(--border-strong);border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle;}
  .fp-di-meta{font-family:var(--mono);font-size:.62rem;color:var(--dim);white-space:nowrap;}
  .fp-di-check{color:var(--accent);}
  .fp-dd-new{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:11px 14px;color:var(--accent);font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:rgba(125,227,141,.05);border:none;}
  .fp-dd-new:hover{background:rgba(125,227,141,.1);}
</style>
</head>
<body>
<div id="root"></div>
<script src="projects.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const LS_KEY = "valueprop-v2";
const clone = o => JSON.parse(JSON.stringify(o));
const uid = ()=> Date.now()*1000 + Math.floor(Math.random()*1000);

/* zone metadata — customer profile first (jobs→pains→gains), then value map */
const ZONES = {
  jobs:   { side:"profile", seq:1, title:"Customer Jobs", pair:"products",  bis:0,
    body:"The tasks your customer is trying to get done — functional (treat the water, file the report), social (look competent), emotional (feel in control). Written from their point of view. Star the ones that matter most." },
  pains:  { side:"profile", seq:2, title:"Pains", pair:"relievers", bis:120,
    body:"What annoys, blocks or risks the customer before, during and after the job: obstacles, costs, frustrations, fears. Star the extreme pains — that's where value propositions are born." },
  gains:  { side:"profile", seq:3, title:"Gains", pair:"creators",  bis:240,
    body:"The outcomes and benefits the customer wants — required, expected, desired, or a surprise delight. Be concrete (“save 2 hours a shift”, not “be efficient”). Star the ones they care about most." },
  products:  { side:"value", seq:4, title:"Products & Services", pair:"jobs",
    body:"What you offer — physical, digital, service or financial. The least meaningful on its own: a product only creates value relative to a job. For each, tick the customer jobs it helps get done." },
  relievers: { side:"value", seq:5, title:"Pain Relievers", pair:"pains",
    body:"How your offer kills, reduces or removes the pains. Relieve a few pains extremely well rather than many superficially. For each reliever, tick the pain(s) it neutralises." },
  creators:  { side:"value", seq:6, title:"Gain Creators", pair:"gains",
    body:"How your offer produces the gains the customer wants. Don't try to create every gain — focus where you can make a real difference. For each creator, tick the gain(s) it produces." }
};
const ORDER = ["jobs","pains","gains","products","relievers","creators"];
const LABELS = { jobs:"Jobs", pains:"Pains", gains:"Gains", products:"Products", relievers:"Pain Relievers", creators:"Gain Creators" };

/* ---------- SportSpots seed ---------- */
const J=(t,imp)=>({id:uid(),t,imp:!!imp});
const SEED = (()=>{
  const jobs=[J("Stay active around a busy work schedule",1),J("Find a trainer or venue without hassle",1),J("Look after team wellbeing (as an employer)",0),J("Socialise / have fun with colleagues",0)];
  const pains=[J("Booking & paying is fragmented and slow",1),J("Hard to find sessions nearby at the right time",1),J("Give up when organising it is too much effort",1),J("Gyms & trainers have empty, unsold slots",0)];
  const gains=[J("Book a session in under a minute",1),J("Sessions near me, when I'm free",1),J("Company covers part of the cost",0),J("Feel part of a team / stay motivated",0)];
  const products=[{id:uid(),t:"SportSpots mobile app",links:[jobs[0].id,jobs[1].id]},{id:uid(),t:"Corporate HR dashboard",links:[jobs[2].id]}];
  const relievers=[{id:uid(),t:"One-minute booking & payment",links:[pains[0].id,pains[2].id]},{id:uid(),t:"Map + time filters",links:[pains[1].id]}];
  const creators=[{id:uid(),t:"Geolocated session feed",links:[gains[1].id]},{id:uid(),t:"Corporate allowance & gamification",links:[gains[2].id,gains[3].id]}];
  return { seg:{name:"Corporate employees", desc:"Office workers at mid-to-large companies who want to stay active but struggle to fit it around work."}, jobs, pains, gains, products, relievers, creators };
})();
const BLANK = { seg:{name:"",desc:""}, jobs:[], pains:[], gains:[], products:[], relievers:[], creators:[] };

/* ---------- SAFE-Cycle seed (municipal non-revenue-water) ---------- */
const SAFE_SEED = (()=>{
  const jobs=[J("Keep water losses below the contract / regulatory target",1),J("Find and fix leaks before they escalate",1),J("Justify spend & show ROI to the group",0),J("Avoid service complaints and street flooding",1)];
  const pains=[J("Locating a leak takes ~11 days on average",1),J("Almost a third of treated water is non-revenue",1),J("Night-flow anomalies are caught late",1),J("Crews chase vague areas without a tight radius",0)];
  const gains=[J("Locate leaks within hours, to ~50 m",1),J("Recover water and defer capital works",1),J("Dispatch crews with a precise search area",0),J("Prove recovered water in € and m³",0)];
  const products=[{id:uid(),t:"SAFE-Cycle detection platform",links:[jobs[0].id,jobs[1].id,jobs[3].id]},{id:uid(),t:"Crew dispatch app",links:[jobs[1].id]}];
  const relievers=[{id:uid(),t:"Cross-DMA correlation → ~50 m localisation",links:[pains[0].id,pains[3].id]},{id:uid(),t:"Night-flow anomaly detection on existing telemetry",links:[pains[1].id,pains[2].id]}];
  const creators=[{id:uid(),t:"Recovery dashboard (€ & m³ per cluster)",links:[gains[1].id,gains[3].id]},{id:uid(),t:"Auto-dispatch with map + radius",links:[gains[0].id,gains[2].id]}];
  return { seg:{name:"Municipal water operators", desc:"Ops teams at municipal water utilities accountable for non-revenue-water targets across their DMAs."}, jobs, pains, gains, products, relievers, creators };
})();

// load the model for the active business case (or fall back to single-state)
function loadActiveModel(){
  try{
    var FP = window.FerraoProjects;
    if(FP){ var k = FP.key(); if(k){ var s = localStorage.getItem(k); return s ? JSON.parse(s) : clone(BLANK); } }
    var s2 = localStorage.getItem(LS_KEY); if(s2) return JSON.parse(s2);
  }catch(e){}
  return clone(SEED);
}

/* geometry */
const CX=240, CY=240, R=180;
function pt(cx,cy,r,deg){const a=deg*Math.PI/180;return [cx+r*Math.cos(a), cy+r*Math.sin(a)];}
function wedge(bis){const a0=bis-60,a1=bis+60;const[p0x,p0y]=pt(CX,CY,R,a0);const[p1x,p1y]=pt(CX,CY,R,a1);
  return `M ${CX} ${CY} L ${p0x.toFixed(1)} ${p0y.toFixed(1)} A ${R} ${R} 0 0 1 ${p1x.toFixed(1)} ${p1y.toFixed(1)} Z`;}
/* value map rects (right) */
const VMAP = {
  products:  {x:740,y:70,w:170,h:340},
  creators:  {x:545,y:70,w:188,h:166},
  relievers: {x:545,y:244,w:188,h:166}
};

function App(){
  const [m,setM]=useState(loadActiveModel);
  const [sel,setSel]=useState("jobs");
  const [vpOpen,setVpOpen]=useState(false);
  const barRef=useRef(null);
  useEffect(()=>{
    var FP=window.FerraoProjects; if(!FP) return;
    FP.init({ toolNamespace:"value-proposition", migrateFrom:LS_KEY, migrateName:"Importado",
      exampleSeeds:{ "ex-sportspots":SEED, "ex-safe-cycle":SAFE_SEED },
      onActiveData:function(){ setM(loadActiveModel()); } });
    if(barRef.current) FP.mountBar(barRef.current,{label:"Business case", extras:[{label:"blank",title:"Clear the canvas",onClick:blank}]});
    setM(loadActiveModel());
  },[]);
  useEffect(()=>{ try{ var FP=window.FerraoProjects,k=FP&&FP.key();
    if(k){ localStorage.setItem(k,JSON.stringify(m)); FP.touch(FP.activeId()); }
    else { localStorage.setItem(LS_KEY,JSON.stringify(m)); }
  }catch(e){} },[m]);

  const Z = ZONES[sel];
  const profileOf = (z)=> ZONES[z].side==="profile" ? z : ZONES[z].pair; // the profile zone of the active pair
  const activeProfile = profileOf(sel);
  const rot = -ZONES[activeProfile].bis; // rotate so active pair's profile slice faces right

  const setSeg=(k,v)=>setM(x=>({...x,seg:{...x.seg,[k]:v}}));
  const setItem=(z,id,v)=>setM(x=>({...x,[z]:x[z].map(it=>it.id===id?{...it,t:v}:it)}));
  const addItem=(z,v)=>setM(x=>{const it=ZONES[z].side==="profile"?{id:uid(),t:v,imp:false}:{id:uid(),t:v,links:[]};return {...x,[z]:[...x[z],it]};});
  const delItem=(z,id)=>setM(x=>{const c={...x,[z]:x[z].filter(it=>it.id!==id)};
    if(ZONES[z].side==="profile"){const vz=ZONES[z].pair;c[vz]=c[vz].map(it=>({...it,links:(it.links||[]).filter(l=>l!==id)}));}
    return c;});
  const toggleStar=(z,id)=>setM(x=>({...x,[z]:x[z].map(it=>it.id===id?{...it,imp:!it.imp}:it)}));
  const toggleLink=(z,id,targetId)=>setM(x=>({...x,[z]:x[z].map(it=>{
    if(it.id!==id)return it;const ls=it.links||[];return {...it,links:ls.includes(targetId)?ls.filter(l=>l!==targetId):[...ls,targetId]};})}));

  const example=()=>{if(confirm("Load the SportSpots example?"))setM(clone(SEED));};
  const blank=()=>{if(confirm("Clear everything?"))setM(clone(BLANK));};

  /* ---- fit & gaps ---- */
  function addressed(profZone, id){const vz=ZONES[profZone].pair;return m[vz].some(it=>(it.links||[]).includes(id));}
  const importantProfile = ["jobs","pains","gains"].flatMap(z=>m[z].filter(it=>it.imp).map(it=>({z,it})));
  const addressedImportant = importantProfile.filter(({z,it})=>addressed(z,it.id));
  const fitPct = importantProfile.length ? Math.round(100*addressedImportant.length/importantProfile.length) : 0;
  const gaps = importantProfile.filter(({z,it})=>!addressed(z,it.id)).map(({z,it})=>({z,t:it.t}));

  /* ---- value statement (the output) ---- */
  const jobsDone   = m.jobs.filter(j=>m.products.some(p=>(p.links||[]).includes(j.id)));
  const painsKilled= m.pains.filter(p=>m.relievers.some(r=>(r.links||[]).includes(p.id)));
  const gainsMade  = m.gains.filter(g=>m.creators.some(c=>(c.links||[]).includes(g.id)));
  const prodNames  = m.products.map(p=>p.t).filter(Boolean);
  const seg = m.seg.name || "your customer";
  const list = (arr,key)=> arr.map(x=>x[key]||x.t).filter(Boolean);

  function stmt(){
    if(!prodNames.length) return null;
    const join=a=>a.length>1?a.slice(0,-1).join(", ")+" and "+a[a.length-1]:a[0];
    let s = prodNames.length>1? join(prodNames):prodNames[0];
    const parts=[];
    if(jobsDone.length) parts.push("help them "+join(jobsDone.map(j=>j.t.toLowerCase())));
    if(painsKilled.length) parts.push("relieve "+join(painsKilled.map(p=>p.t.toLowerCase())));
    if(gainsMade.length) parts.push("and create "+join(gainsMade.map(g=>g.t.toLowerCase())));
    return {head:s, seg, parts};
  }
  const S = stmt();

  /* ---- export ---- */
  const asText=()=>{
    const L=[]; L.push("VALUE PROPOSITION — "+(m.seg.name||"")); if(m.seg.desc)L.push(m.seg.desc); L.push("");
    if(S){L.push("For "+S.seg+", "+S.head+" "+S.parts.join(", ")+".");L.push("");}
    L.push("Products & services:"); m.products.forEach(p=>L.push("  • "+p.t));
    L.push("","Jobs performed:"); jobsDone.forEach(j=>L.push("  • "+j.t));
    L.push("","Pains relieved:"); painsKilled.forEach(p=>L.push("  • "+p.t));
    L.push("","Gains created:"); gainsMade.forEach(g=>L.push("  • "+g.t));
    if(gaps.length){L.push("","Still to address (important, unmet):");gaps.forEach(g=>L.push("  • ["+LABELS[g.z]+"] "+g.t));}
    return L.join("\n");
  };
  const copy=()=>{navigator.clipboard.writeText(asText()).then(()=>{},()=>{});};
  const exportJSON=()=>{const b=new Blob([JSON.stringify(m,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(m.seg.name||"value-proposition").replace(/\s+/g,"_")+".vp.json";a.click();};

  /* ---- diagram pieces ---- */
  const isOn=z=>z===sel, isPair=z=>z===ZONES[sel].pair;
  function zoneClass(z){return "zone"+(isOn(z)?" on":(isPair(z)?" pair":""));}

  return (
   <div className="wrap">
    <a className="site-back" href="../innovation.html">← innovation</a>
    <div className="topbar">
      <div className="brand"><span className="pp">~/</span> value proposition canvas
        <small>fit your offer to the customer — then see why it's valuable</small></div>
    </div>
    <div id="project-bar" ref={barRef}></div>

    <div className="seg">
      <div className="l">Customer segment</div>
      <input className="name" value={m.seg.name} onChange={e=>setSeg("name",e.target.value)} placeholder="Who is this canvas for? (one specific segment)"/>
      <textarea value={m.seg.desc} onChange={e=>setSeg("desc",e.target.value)} placeholder="Describe them in a sentence — context, role, situation. Keep the segment narrow; refine if it feels too broad."/>
      <div className="hint">One canvas = one segment. The whole method only works when you have a specific customer in mind.</div>
    </div>

    <div className="order">
      <span className="lab">start here ·</span>
      {ORDER.map((z,i)=>(<React.Fragment key={z}>
        {i>0 && <span className="arr">{i===3?"⇒":"→"}</span>}
        <span className={"step "+(ZONES[z].side==="profile"?"cust":"val")+(sel===z?" on":"")} role="button" tabIndex={0} onClick={()=>setSel(z)} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();setSel(z);}}}>{ZONES[z].seq}. {LABELS[z]}</span>
      </React.Fragment>))}
      <div className="fitbar" style={{marginLeft:"auto"}}>
        <div className="ft">fit — important needs addressed · {fitPct}%</div>
        <div className="bar"><i style={{width:fitPct+"%"}}></i></div>
      </div>
    </div>

    {/* DIAGRAM */}
    <div className="canvas">
      <svg className="vpc" viewBox="0 0 980 480" xmlns="http://www.w3.org/2000/svg">
        <text className="ztitle" x="240" y="22">CUSTOMER PROFILE</text>
        <text className="ztitle" x="725" y="22">VALUE MAP</text>

        {/* connector for the active pair */}
        {(()=>{const vz=ZONES[activeProfile].pair;const r=VMAP[vz];const ty=r.y+r.h/2;
          return <line className={"conn show"} x1={CX+R-6} y1={CY} x2={r.x} y2={ty}/>;})()}

        {/* CUSTOMER PROFILE wheel (left) */}
        <g className="wheel" style={{transform:`rotate(${rot}deg)`}}>
          {["jobs","pains","gains"].map(z=>(
            <g key={z} className={zoneClass(z)} onClick={()=>setSel(z)}>
              <path className="zbg" d={wedge(ZONES[z].bis)}/>
            </g>
          ))}
        </g>
        {/* labels counter-rotated so they stay upright */}
        {["jobs","pains","gains"].map(z=>{
          const [lx,ly]=pt(CX,CY,108,ZONES[z].bis);
          return (<g key={"l"+z} className="lblg" style={{transform:`rotate(${rot}deg)`,transformOrigin:`${CX}px ${CY}px`}} pointerEvents="none">
            <g style={{transform:`rotate(${-rot}deg)`,transformOrigin:`${lx}px ${ly}px`,transformBox:"view-box"}}>
              <text className="zlab" x={lx} y={ly-4} fontSize="14">{LABELS[z]}</text>
              <text className="zcount" x={lx} y={ly+14}>{m[z].length} {m[z].length===1?"item":"items"}</text>
            </g>
          </g>);
        })}

        {/* VALUE MAP (right) */}
        {["products","creators","relievers"].map(z=>{const r=VMAP[z];const cx=r.x+r.w/2;const cy=r.y+r.h/2;
          return (<g key={z} className={zoneClass(z)} onClick={()=>setSel(z)}>
            <rect className="zbg" x={r.x} y={r.y} width={r.w} height={r.h} rx="10"/>
            <text className="zlab" x={cx} y={cy-4} fontSize="13">{LABELS[z]}</text>
            <text className="zcount" x={cx} y={cy+14}>{m[z].length} {m[z].length===1?"item":"items"}</text>
          </g>);})}
      </svg>
    </div>

    {/* EXPLAIN + EDITOR */}
    <div className="below">
      <div className="explain">
        <div className="ey">// {Z.side==="profile"?"customer profile":"value map"}</div>
        <h2>{Z.title}</h2>
        <div className="seq">step {Z.seq} of 6{Z.seq<6?" · next: "+LABELS[ORDER[Z.seq]]:" · then check fit →"}</div>
        <p>{Z.body}</p>
        <div className="fitq">{Z.side==="profile" ? "Star what matters most — fit is measured against the important ones." : "Tick which "+LABELS[ZONES[sel].pair].toLowerCase()+" each item addresses. Unticked items are decoration."}</div>
      </div>

      <div className="editor">
        <div className="et">{Z.title} — your items</div>
        {m[sel].length===0 && <div className="empty">No items yet — add the first one below.</div>}
        {m[sel].map(it=>(
          <div key={it.id}>
            <div className="it">
              {Z.side==="profile" && <button className={"star"+(it.imp?" on":"")} onClick={()=>toggleStar(sel,it.id)} title="mark important">{it.imp?"★":"☆"}</button>}
              <input className="t" value={it.t} onChange={e=>setItem(sel,it.id,e.target.value)} placeholder="…"/>
              <button className="del" onClick={()=>delItem(sel,it.id)} title="remove">×</button>
            </div>
            {Z.side==="value" && (()=>{const tg=ZONES[sel].pair;return (
              <div className="links">
                {m[tg].length===0 ? <span className="none">add some {LABELS[tg].toLowerCase()} first →</span> :
                  m[tg].map(t=>(<span key={t.id} className={"lk"+((it.links||[]).includes(t.id)?" on":"")} onClick={()=>toggleLink(sel,it.id,t.id)}>{t.imp?"★ ":""}{t.t||"…"}</span>))}
              </div>);})()}
          </div>
        ))}
        <div className="addrow">
          <input id="addinp" placeholder={"add a "+Z.title.toLowerCase().replace(/s$/,"")+" and press Enter"} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addItem(sel,e.target.value.trim());e.target.value="";}}}/>
          <button className="btn" onClick={()=>{const el=document.getElementById("addinp");if(el.value.trim()){addItem(sel,el.value.trim());el.value="";}}}>+ add</button>
        </div>
      </div>
    </div>

    {/* DELIVERABLE */}
    <div className={"vp"+(vpOpen?" open":"")} id="vp">
      <div className="vphead" onClick={()=>setVpOpen(o=>!o)}>
        <span className="vchev">▸</span>
        <h3>Your value proposition{m.seg.name?" — "+m.seg.name:""}</h3>
        <span className="vpstatus">{S?("fit "+fitPct+"% · ready"):"not ready yet"}</span>
        <button className="btn vptoggle" onClick={e=>{e.stopPropagation();setVpOpen(o=>!o);}}>{vpOpen?"hide":"open result"}</button>
      </div>
      {vpOpen && <div className="vpbody">
      <div className="vsub">Where you arrive: the products & services, and <em>why</em> they're valuable — the jobs they do, the pains they relieve, the gains they create.</div>
      {S ? <div className="stmt">For <b>{S.seg}</b>, <b>{S.head}</b> {S.parts.join(", ")}.</div>
         : <div className="stmt" style={{color:"var(--mut)"}}>Add your products &amp; services and link them to jobs, pains and gains to generate the statement.</div>}
      <div className="vcols">
        <div className="vcol"><h4>▣ Products &amp; services</h4>
          {prodNames.length? <ul>{m.products.map(p=>(<li key={p.id}>{p.t}</li>))}</ul> : <div className="none">none yet</div>}</div>
        <div className="vcol"><h4>✓ Jobs performed</h4>
          {jobsDone.length? <ul>{jobsDone.map(j=>(<li key={j.id}>{j.imp?"★ ":""}{j.t}</li>))}</ul> : <div className="none">link a product to a job</div>}</div>
        <div className="vcol"><h4>✓ Pains relieved &amp; gains created</h4>
          {(painsKilled.length||gainsMade.length)? <ul>{painsKilled.map(p=>(<li key={p.id}>{p.imp?"★ ":""}{p.t}</li>))}{gainsMade.map(g=>(<li key={g.id}>{g.imp?"★ ":""}{g.t}</li>))}</ul> : <div className="none">link relievers &amp; creators</div>}</div>
      </div>
      {gaps.length>0 && <div className="gaps"><b>Gaps</b> — important needs nothing addresses yet: {gaps.map((g,i)=>(<span key={i} className="g">[{LABELS[g.z]}] {g.t}{i<gaps.length-1?" ·":""}</span>))}. These are your next experiments.</div>}
      <div className="doctools">
        <button className="btn primary" onClick={copy}>⧉ copy</button>
        <button className="btn primary" onClick={()=>window.print()}>print / PDF</button>
        <button className="btn" onClick={exportJSON}>export JSON</button>
      </div>
      <div className="note">Auto-saved in your browser. Fit is measured against the ★ important jobs, pains and gains.</div>
      </div>}
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
