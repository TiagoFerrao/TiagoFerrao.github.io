<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Press Release — ferrao.me</title>
<meta name="theme-color" content="#001a20">
<meta name="description" content="Write an Amazon-style working-backwards press release: name the product, capture attention, explain the value before you build.">
<link rel="icon" href="../img/bee.png">
<link rel="apple-touch-icon" href="../img/bee.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#001a20; --bg-2:#002a33; --panel:rgba(0,50,60,.55); --panel-2:rgba(0,42,51,.92);
    --accent:#7DE38D; --accent-rgb:125,227,141; --accent-2:#288f5b;
    --text:#e0f0e8; --dim:#8fb8a0; --mut:#5a8a70;
    --border:rgba(125,227,141,.18); --border-strong:rgba(125,227,141,.4);
    --mono:'Inconsolata',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--disp);background:radial-gradient(1100px 560px at 82% -10%,rgba(125,227,141,.06),transparent 60%),var(--bg);color:var(--text);font-size:15px;line-height:1.5;}
  a{color:var(--accent);}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 20px 70px;}
  .site-back{display:inline-block;font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:var(--dim);text-decoration:none;margin-bottom:14px;}
  .site-back:hover{color:var(--accent);}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:13px;margin-bottom:16px;}
  .brand{font-family:var(--disp);font-weight:700;font-size:18px;}
  .brand .pp{color:var(--accent);text-shadow:0 0 10px rgba(var(--accent-rgb),.4);}
  .brand small{display:block;font-family:var(--mono);font-weight:400;font-size:12px;color:var(--dim);}
  .topbar .sp{flex:1}
  .btn{font-family:var(--mono);font-size:12.5px;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 11px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block;}
  .btn:hover{color:var(--accent);border-color:var(--border-strong);}
  .btn.primary{color:var(--bg);background:var(--accent);border-color:var(--accent);font-weight:700;}
  .btn.primary:hover{filter:brightness(1.08);}

  .intro{font-size:13px;color:var(--dim);margin-bottom:16px;border-left:2px solid var(--accent-2);padding-left:11px;max-width:80ch;}
  .intro b{color:var(--text);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
  @media(max-width:900px){.grid{grid-template-columns:1fr;}}

  .field{margin-bottom:16px;}
  .field .lab{font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .field .hint{font-size:11.5px;color:var(--mut);margin-bottom:7px;line-height:1.5;}
  .field input,.field textarea{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--disp);font-size:14px;padding:9px 11px;line-height:1.55;}
  .field textarea{resize:vertical;min-height:64px;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--border-strong);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:10px;}

  /* features → value list */
  .feat{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:7px;align-items:center;}
  .xbtn{background:transparent;border:none;color:var(--mut);cursor:pointer;font-size:16px;}
  .xbtn:hover{color:#e07a6b;}

  /* the document preview */
  .docwrap{position:sticky;top:14px;}
  .doctools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .pr-doc{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:28px 30px;}
  .pr-headline{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:1.2rem;line-height:1.3;letter-spacing:.01em;color:var(--accent);}
  .pr-sub{font-style:italic;color:var(--dim);margin-top:10px;font-size:1rem;line-height:1.5;}
  .pr-rule{height:1px;background:var(--border);margin:16px 0;}
  .pr-body p{color:var(--text);line-height:1.75;margin-bottom:12px;font-size:.95rem;}
  .pr-body p .dl{font-family:var(--mono);color:var(--dim);}
  .pr-feats{margin:0 0 14px 2px;list-style:none;}
  .pr-feats li{position:relative;padding-left:18px;color:var(--text);line-height:1.6;margin-bottom:6px;font-size:.92rem;}
  .pr-feats li::before{content:"▸";position:absolute;left:0;color:var(--accent);}
  .pr-feats li b{color:var(--accent);font-weight:600;}
  .pr-quote{border-left:2px solid var(--accent-2);padding:2px 0 2px 14px;margin:0 0 14px;font-style:italic;color:var(--text);line-height:1.7;font-size:.95rem;}
  .pr-quote .by{display:block;font-style:normal;color:var(--mut);font-size:.82rem;margin-top:5px;}
  .pr-cta{color:var(--accent);font-weight:600;}
  .ph{color:var(--mut);font-style:italic;}
  .note{font-size:11.5px;color:var(--mut);margin-top:10px;}

  @page{ size:A4 portrait; margin:16mm; }
  @media print{
    body *{visibility:hidden;}
    #pr-doc, #pr-doc *{visibility:visible;}
    #pr-doc{position:absolute;left:0;top:0;width:100%;background:#fff;border:none;padding:0;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;}
    #pr-doc .pr-headline{color:#111;}
    #pr-doc .pr-sub{color:#444;}
    #pr-doc .pr-body p,#pr-doc .pr-feats li,#pr-doc .pr-quote{color:#111;}
    #pr-doc .pr-feats li::before,#pr-doc .pr-feats li b,#pr-doc .pr-cta{color:#1c6b41;}
    #pr-doc .pr-quote{border-left-color:#1c6b41;}
    #pr-doc .pr-rule{background:#ccc;}
    #pr-doc .pr-body p .dl,#pr-doc .pr-quote .by{color:#555;}
    #pr-doc .ph{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect} = React;
const LS_KEY = "press-release-v1";
const clone = o => JSON.parse(JSON.stringify(o));

/* ---------- SportSpots seed (working-backwards style) ---------- */
const SEED = {
  product:"SportSpots",
  headline:"SPORTSPOTS LETS ANY EMPLOYEE BOOK A SPORTS SESSION WITH A LOCAL TRAINER IN UNDER A MINUTE",
  subheading:"SportSpots connects corporate teams with nearby trainers and venues, turning spare gym capacity into healthier, happier employees.",
  city:"Lisbon", date:"", company:"SportSpots",
  summary:"SportSpots today launched a marketplace that lets employees of partner companies discover, book and pay for sports activities with local trainers and facilities in just a few taps.",
  problem:"Staying active around a busy job is hard. Finding a trainer or a free court means juggling phone calls, scattered schedules and awkward payments — so people give up. Meanwhile gyms and trainers sit with empty slots they can't fill.",
  solution:"SportSpots solves both sides at once. Employees open the app, see sessions near them, filter by sport and time, and book and pay in under a minute. Trainers and venues fill their spare capacity and get paid automatically. Companies sponsor a monthly allowance and follow participation through a simple dashboard, while gamified team challenges keep people coming back.",
  features:[
    {feature:"One-minute booking & payment", value:"removes the friction that makes people give up"},
    {feature:"Map-based discovery", value:"find a session near you, right now"},
    {feature:"Corporate dashboard", value:"HR sees participation and wellbeing at a glance"},
    {feature:"Team challenges & points", value:"keeps employees engaged month after month"}
  ],
  companyQuote:"We wanted booking a workout to be as easy as ordering a coffee — and to give trainers a steady stream of clients at the same time.",
  companyQuoteBy:"Tiago Ferrão, founder of SportSpots",
  start:"Employees of partner companies download SportSpots for iOS or Android, sign in with their work email, and book their first session in minutes. Trainers and venues list their availability for free and get paid after each session.",
  customerQuote:"I used to skip exercise because organising it was a hassle. Now I book a Tuesday futsal game with two taps and my company covers most of it.",
  customerQuoteBy:"Marta R., software engineer at a partner company",
  cta:"To bring SportSpots to your team, visit sportspots.app."
};

/* ---------- Amazon's canonical example (Circulert) ---------- */
const CIRCULERT = {
  product:"Circulert",
  headline:"CIRCULERT APP ALERTS SHOPPERS WHEN THE PRODUCTS AND SERVICES THEY WANT BECOME AVAILABLE OR DROP IN PRICE",
  subheading:"If a product or service isn't available today or at the right price, Circulert helps shoppers buy it later, for less.",
  city:"Seattle", date:"January 1, 2021", company:"Circulert, a Seattle company",
  summary:"Circulert today launched a new application for iOS and Android that notifies users when the products and services they want or need become available for sale or drop in price.",
  problem:"Many items consumers want to buy aren't available today, or the price isn't quite sharp enough to prompt a purchase. If there's a brand you like, you have to keep checking retailer websites for new lines, or sift through a slew of daily emails to find the one that matters. How often have you found out your favourite band is playing your town after the tickets sold out? Too often.",
  solution:"Circulert solves these problems by telling you when you can buy the things you want — or buy them at the price you want. No more work. No more missing out. Circulert learns about the products and services you care about and sends you only the notifications you want. You choose the style and frequency, or view a feed of recent alerts. You are in control.",
  features:[],
  companyQuote:"Our goal with Circulert is to take the hassle out of buying things later. There are tens of thousands of retailers selling everything imaginable; Circulert filters out the noise and helps people get what they need at the best price, saving them time and money.",
  companyQuoteBy:"Ian McAllister, creator of Circulert",
  start:"To try Circulert, go to Circulert.com and download the app for iOS or Android. Connect it to your Amazon, Ticketmaster and other accounts, then review the suggested alerts. Circulert sends only highly relevant notifications when the items you want are available at the right price.",
  customerQuote:"I absolutely hate missing out on a great deal. I used to hit my favourite websites every few days. With Circulert I find out right away and never miss out.",
  customerQuoteBy:"Clare Keating, a nurse in Seattle",
  cta:"If you want to save time or money (or both!), visit circulert.com today."
};

const BLANK = {
  product:"", headline:"", subheading:"", city:"", date:"", company:"",
  summary:"", problem:"", solution:"", features:[{feature:"",value:""}],
  companyQuote:"", companyQuoteBy:"", start:"", customerQuote:"", customerQuoteBy:"", cta:""
};

/* fields with their working-backwards guidance */
function Field({label,hint,children}){
  return (<div className="field"><div className="lab">{label}</div><div className="hint">{hint}</div>{children}</div>);
}

function App(){
  const [m,setM]=useState(()=>{try{const s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s);}catch(e){}return clone(SEED);});
  useEffect(()=>{try{localStorage.setItem(LS_KEY,JSON.stringify(m));}catch(e){}},[m]);
  const set=(k,v)=>setM(x=>({...x,[k]:v}));
  const setFeat=(i,k,v)=>setM(x=>{const f=clone(x.features);f[i][k]=v;return {...x,features:f};});
  const addFeat=()=>setM(x=>({...x,features:[...x.features,{feature:"",value:""}]}));
  const delFeat=(i)=>setM(x=>{const f=clone(x.features);f.splice(i,1);if(!f.length)f.push({feature:"",value:""});return {...x,features:f};});

  const load=(seed)=>{if(confirm("Replace the current draft?"))setM(clone(seed));};
  const blank=()=>{if(confirm("Clear everything and start a blank release?"))setM(clone(BLANK));};
  const ph=(v,placeholder)=> v && v.trim() ? v : null;

  /* plain-text assembly for copy */
  const asText=()=>{
    const L=[];
    if(m.headline) L.push(m.headline.toUpperCase());
    if(m.subheading) L.push(m.subheading);
    L.push("");
    const dl=[m.city,m.date].filter(Boolean).join(", ");
    L.push((dl?dl+" — ":"")+(m.company?m.company+" ":"")+m.summary);
    if(m.problem) L.push("",m.problem);
    if(m.solution) L.push("",m.solution);
    m.features.filter(f=>f.feature||f.value).forEach(f=>L.push("  • "+f.feature+(f.value?" — "+f.value:"")));
    if(m.companyQuote) L.push("","“"+m.companyQuote+"”"+(m.companyQuoteBy?" — "+m.companyQuoteBy:""));
    if(m.start) L.push("",m.start);
    if(m.customerQuote) L.push("","“"+m.customerQuote+"”"+(m.customerQuoteBy?" — "+m.customerQuoteBy:""));
    if(m.cta) L.push("",m.cta);
    return L.join("\n");
  };
  const copy=()=>{navigator.clipboard.writeText(asText()).then(()=>{},()=>{});};
  const exportJSON=()=>{const b=new Blob([JSON.stringify(m,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(m.product||"press-release").replace(/\s+/g,"_")+".pr.json";a.click();};

  const dateline = [m.city,m.date].filter(x=>x&&x.trim()).join(", ");

  return (
   <div className="wrap">
    <a className="site-back" href="../innovation.html">← innovation</a>
    <div className="topbar">
      <div className="brand"><span className="pp">~/</span> press release
        <small>Amazon working-backwards — write the launch story before you build</small></div>
      <div className="sp"></div>
      <button className="btn" onClick={()=>load(SEED)}>example</button>
      <button className="btn" onClick={()=>load(CIRCULERT)}>Amazon example</button>
      <button className="btn" onClick={blank}>blank</button>
    </div>

    <div className="intro">Work <b>backwards</b>: imagine the product is finished and write the press release announcing it. If the story isn't compelling, the idea isn't ready. Nail the <b>headline</b> (capture attention), the <b>value</b> (why anyone cares), and <b>name the features</b> — always tied to the benefit they deliver.</div>

    <div className="grid">
      {/* ---- FORM ---- */}
      <div>
        <Field label="① Headline" hint="Name the product and its #1 benefit so a customer instantly gets it. Punchy, like a real news headline (it'll render in caps).">
          <textarea value={m.headline} onChange={e=>set("headline",e.target.value)} placeholder="PRODUCT does THE THING that gives customers THE BENEFIT"/>
        </Field>
        <Field label="② Subheading" hint="One sentence: who it's for and the value they get. The reader decides here whether to keep reading.">
          <textarea value={m.subheading} onChange={e=>set("subheading",e.target.value)} placeholder="In one line, the customer + the benefit."/>
        </Field>
        <Field label="③ Dateline & summary" hint="City, date, who's announcing — then 1–2 sentences on what launched and the key benefit.">
          <div className="row3" style={{marginBottom:8}}>
            <input value={m.city} onChange={e=>set("city",e.target.value)} placeholder="City"/>
            <input value={m.date} onChange={e=>set("date",e.target.value)} placeholder="Date"/>
            <input value={m.company} onChange={e=>set("company",e.target.value)} placeholder="Company / who's announcing"/>
          </div>
          <textarea value={m.summary} onChange={e=>set("summary",e.target.value)} placeholder="…today launched … that lets customers …"/>
        </Field>
        <Field label="④ The problem" hint="Make the customer pain vivid and specific — the reader should feel it. No product talk yet.">
          <textarea value={m.problem} onChange={e=>set("problem",e.target.value)} placeholder="Today, customers struggle to …"/>
        </Field>
        <Field label="⑤ The solution" hint="How the product elegantly solves the problem. Describe what it does and the experience — benefit first, not a dry feature dump.">
          <textarea value={m.solution} onChange={e=>set("solution",e.target.value)} placeholder="PRODUCT solves this by …"/>
        </Field>
        <Field label="⑥ Key features → value" hint="Name each headline feature and the value it delivers. This is the discipline: never a feature without its benefit.">
          {m.features.map((f,i)=>(
            <div className="feat" key={i}>
              <input value={f.feature} onChange={e=>setFeat(i,"feature",e.target.value)} placeholder="feature"/>
              <input value={f.value} onChange={e=>setFeat(i,"value",e.target.value)} placeholder="…the value it gives"/>
              <button className="xbtn" onClick={()=>delFeat(i)} title="remove">×</button>
            </div>
          ))}
          <button className="btn" onClick={addFeat} style={{marginTop:4}}>+ feature</button>
        </Field>
        <Field label="⑦ Quote from you" hint="A leader's quote on why you built it / the mission. Human, not corporate.">
          <textarea value={m.companyQuote} onChange={e=>set("companyQuote",e.target.value)} placeholder="“Our goal with PRODUCT is …”"/>
          <input style={{marginTop:8}} value={m.companyQuoteBy} onChange={e=>set("companyQuoteBy",e.target.value)} placeholder="Name, role"/>
        </Field>
        <Field label="⑧ Getting started" hint="Show how easy it is to begin — the first few steps to value.">
          <textarea value={m.start} onChange={e=>set("start",e.target.value)} placeholder="To get started, customers …"/>
        </Field>
        <Field label="⑨ Customer quote" hint="A hypothetical delighted customer — concrete, relatable, in their own voice.">
          <textarea value={m.customerQuote} onChange={e=>set("customerQuote",e.target.value)} placeholder="“I used to … now I …”"/>
          <input style={{marginTop:8}} value={m.customerQuoteBy} onChange={e=>set("customerQuoteBy",e.target.value)} placeholder="Name, descriptor"/>
        </Field>
        <Field label="⑩ Call to action" hint="Close by telling the reader exactly where to go next.">
          <textarea value={m.cta} onChange={e=>set("cta",e.target.value)} placeholder="To get started, visit …"/>
        </Field>
      </div>

      {/* ---- PREVIEW ---- */}
      <div className="docwrap">
        <div className="doctools">
          <button className="btn primary" onClick={copy}>⧉ copy text</button>
          <button className="btn primary" onClick={()=>window.print()}>print / PDF</button>
          <button className="btn" onClick={exportJSON}>export JSON</button>
        </div>
        <div className="pr-doc" id="pr-doc">
          <div className="pr-headline">{ph(m.headline)? m.headline.toUpperCase() : <span className="ph">YOUR HEADLINE</span>}</div>
          {ph(m.subheading) ? <div className="pr-sub">{m.subheading}</div> : <div className="pr-sub ph">a one-line subheading with the value</div>}
          <div className="pr-rule"></div>
          <div className="pr-body">
            <p>{(dateline||m.company)? <span className="dl">{[dateline,m.company].filter(Boolean).join(" — ")} — </span> : null}{ph(m.summary)||<span className="ph">your summary paragraph…</span>}</p>
            {ph(m.problem) && <p>{m.problem}</p>}
            {ph(m.solution) && <p>{m.solution}</p>}
            {m.features.filter(f=>f.feature||f.value).length>0 &&
              <ul className="pr-feats">{m.features.filter(f=>f.feature||f.value).map((f,i)=>(<li key={i}><b>{f.feature}</b>{f.value? " — "+f.value : ""}</li>))}</ul>}
            {ph(m.companyQuote) && <div className="pr-quote">“{m.companyQuote}”{m.companyQuoteBy && <span className="by">— {m.companyQuoteBy}</span>}</div>}
            {ph(m.start) && <p>{m.start}</p>}
            {ph(m.customerQuote) && <div className="pr-quote">“{m.customerQuote}”{m.customerQuoteBy && <span className="by">— {m.customerQuoteBy}</span>}</div>}
            {ph(m.cta) && <p className="pr-cta">{m.cta}</p>}
          </div>
        </div>
        <div className="note">Auto-saved in your browser. Print to save a clean PDF, or copy the plain-text version to paste anywhere.</div>
      </div>
    </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
