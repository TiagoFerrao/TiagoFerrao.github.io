<!DOCTYPE html>
<html lang="en" data-theme="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#001a20">
  <title>Bringing Ideas to Investors | Tiago Ferrão</title>
  <meta name="description" content="From a raw idea to a board-ready pitch — a step-by-step process with the tools for each phase.">
  <link rel="icon" href="img/bee.png">
  <link rel="apple-touch-icon" href="img/bee.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/responsive.css?v=2">
  <style>
    /* ===== embedded design tokens (green-screen aesthetic, from innovation.html live) =====
       so the page renders correctly standalone, independent of css/variables.css */
    :root {
      --bg-primary: #001a20;
      --bg-surface: #042730;
      --bg-surface-2: #06303a;
      --text-primary: #e8f4ef;
      --text-secondary: #cfe3db;
      --text-muted: #8fb3a8;
      --accent-primary: #7DE38D;
      --accent-primary-rgb: 125, 227, 141;
      --accent-secondary: #7DE38D;
      --border-subtle: rgba(143, 179, 168, 0.16);
      --border-medium: rgba(143, 179, 168, 0.30);
      --border-strong: rgba(125, 227, 141, 0.35);
      --font-display: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-body: "Inconsolata", ui-monospace, "SF Mono", Menlo, monospace;
      --space-lg: 20px;
      --space-xl: 28px;
      --space-2xl: 40px;
    }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-display); }

    /* ===== hybrid innovation process (page-specific) ===== */
    /* duotone FA icon theming (from the live diagram) */
    .fa-ico { display: block; }
    .fa-ico svg { width: 100%; height: 100%; display: block; }
    .fa-ico .fa-primary   { fill: var(--text-primary); }
    .fa-ico .fa-secondary { fill: var(--accent-primary); opacity: .55; }

    /* ===== phase rail ===== */
    .phaserail { position: relative; margin: 0 0 var(--space-2xl); }
    .phasenav { position: relative; display: flex; align-items: stretch; gap: 8px; padding: 0; max-width: 960px; margin-left: auto; margin-right: auto; }
    .pbox { flex: 1 1 0; min-width: 0; background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-strong); border-radius: 10px; padding: 8px 12px; cursor: pointer; text-align: left;
      transition: border-color .2s ease, background .2s ease; }
    .pbox .pn { font-family: var(--font-body); font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-primary); white-space: nowrap; }
    .pbox .nm { font-family: var(--font-display); font-size: 0.8rem; color: var(--text-primary); margin-top: 2px; line-height: 1.2; }
    .pbox:hover { border-color: var(--accent-primary); }
    .pbox.on { background: var(--accent-primary); border-color: var(--accent-primary); }
    .pbox.on .pn, .pbox.on .nm { color: var(--bg-primary); }
    .pbox.ctx { border-style: dashed; opacity: .55; }
    .pbox.ctx:hover { opacity: .9; }
    .pbox.ctx.on { opacity: 1; }

    /* invisible wrapper for the standalone chips — mirrors disc-wrap geometry so every chip aligns */
    .pwrap { position: relative; flex: 1 1 0; display: flex; flex-direction: column; gap: 5px;
      border: 1px solid transparent; border-radius: 12px; padding: 16px 0 8px; }
    .pwrap .pbox { flex: 1 1 auto; }

    /* the wrapping bracket over the two discovery phases */
    .disc-wrap { position: relative; flex: 2 1 0; display: flex; flex-direction: column; gap: 5px;
      border: 1px solid var(--border-medium); border-radius: 12px; padding: 16px 8px 8px; }
    .disc-wrap .dw-label { position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
      background: var(--bg-primary); padding: 1px 12px; font-family: var(--font-body); font-size: .58rem;
      letter-spacing: .14em; text-transform: uppercase; color: var(--accent-primary); white-space: nowrap; border-radius: 6px; }
    .disc-wrap .dw-row { display: flex; gap: 6px; align-items: flex-start; }
    .disc-wrap .pbox { flex: 1 1 0; }

    /* iteration loop: directional arrows on the bracket + a comet that sweeps
       once around when you click either discovery phase (2.1 ⇄ 2.2) */
    .disc-wrap .dw-label { z-index: 2; }
    .dw-loop { position: absolute; inset: 0; overflow: visible; pointer-events: none; z-index: 1; }
    .dw-loop .dw-arrow, .dw-loop .dw-mover { fill: var(--accent-primary); stroke: var(--bg-primary);
      stroke-width: 1; stroke-linejoin: round; filter: drop-shadow(0 0 2px rgba(125,227,141,.5)); }
    .dw-loop .dw-arrow { opacity: .85; }                /* resting arrow at the start point */
    .dw-loop .dw-mover { opacity: 0; }                  /* travels on click */
    .dw-loop .dw-comet { fill: none; stroke: none; }    /* invisible motion path (geometry only) */

    @media (max-width: 760px) {
      .phasenav { flex-wrap: wrap; }
      .pbox { flex: 1 1 40%; }
      .disc-wrap { flex: 1 1 100%; }
      .dw-loop { display: none; }
    }

    /* ===== content panel: two columns (text | integrated flow) ===== */
    .ppanel { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: var(--space-xl) var(--space-2xl); transition: opacity .2s ease;
      max-width: 960px; margin-left: auto; margin-right: auto; }
    .ppanel.swap { opacity: 0; }
        .pp-grid { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: var(--space-2xl); align-items: stretch; max-width: none; margin: 0; }
    @media (max-width: 900px) { .pp-grid { grid-template-columns: 1fr; gap: var(--space-lg); } }

    .pp-tag { font-family: var(--font-body); font-size: .66rem; letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted); }
    .pp-title { font-family: var(--font-display); font-size: 1.5rem; margin: 5px 0 12px; }
    .pp-ctx { color: var(--text-secondary); line-height: 1.7; max-width: 64ch; margin-bottom: 14px; }
    .pp-ctx strong { color: var(--text-primary); }
    .io { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 8px; font-family: var(--font-body);
      font-size: .8rem; background: rgba(0,0,0,.16); border: 1px solid var(--border-subtle); border-radius: 8px;
      padding: 8px 12px; margin: 0 0 20px; }
    .io .lbl { color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; font-size: .62rem; }
    .io .in { color: var(--text-secondary); } .io .arrow { color: var(--accent-primary); } .io .out { color: var(--accent-primary); }

    /* vertical mini-workflow (left column, words) */
    .miniflow { margin: 4px 0 6px; }
    .mini { position: relative; padding: 0 0 16px 30px; }
    .mini::before { content: ""; position: absolute; left: 8px; top: 20px; bottom: -2px; width: 1px; background: var(--border-medium); }
    .mini:last-child::before { display: none; }
    .mini .mnode { position: absolute; left: 0; top: 4px; width: 17px; height: 17px; border-radius: 50%;
      border: 1px solid var(--accent-secondary); background: var(--bg-primary); display: flex; align-items: center;
      justify-content: center; font-family: var(--font-body); font-size: .6rem; color: var(--accent-primary); }
    .mini .mt { font-weight: 600; color: var(--text-primary); font-size: .95rem; }
    .mini .md { color: var(--text-secondary); font-size: .88rem; line-height: 1.6; margin-top: 2px; max-width: 60ch; }

    .anote { font-size: .85rem; color: var(--text-secondary); border-left: 2px solid var(--accent-secondary);
      padding: 4px 0 4px 12px; margin: 14px 0 2px; }
    .anote b { color: var(--accent-primary); }

    /* ===== right column: the live flow, vertical, sliced per phase ===== */
    .flowcol { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
      background: rgba(0,0,0,.14); border: 1px solid var(--border-subtle); border-radius: 14px;
      padding: 16px 12px; min-width: 124px; align-self: stretch; }
    .flowcol .fc-lbl { font-family: var(--font-body); font-size: .52rem; letter-spacing: .12em;
      text-transform: uppercase; font-weight: 700; color: var(--text-secondary); margin-bottom: 0;
      padding-bottom: 12px; text-align: center; width: 100%; border-bottom: 1px solid var(--border-subtle); }
    .flowcol .fc-stages { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 12px; }
    .fstage { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .fstage .fa-ico { width: 34px; height: 34px; margin-bottom: 5px; }
    .fstage .fl { font-family: var(--font-body); font-size: .66rem; font-weight: 600; color: var(--text-primary); line-height: 1.2; max-width: 92px; }
    .farrow { width: 18px; height: 18px; margin: 6px 0; display: flex; align-items: center; justify-content: center; opacity: .8; }
    .farrow svg { width: 12px; height: 13px; }
    .farrow path { stroke: var(--accent-primary); }
    @media (max-width: 900px) {
      .flowcol { min-width: 0; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 4px 0; }
      .flowcol .fc-lbl { flex: 1 1 100%; }
      .flowcol .fc-stages { display: contents; }
      .farrow { transform: rotate(-90deg); margin: 0 4px; }
    }

    /* tools-for-phase cards (left column, bottom) */
    .tools-lbl { font-family: var(--font-body); font-size: .64rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-muted); margin: 22px 0 8px; }
    .tools { display: flex; flex-wrap: wrap; gap: 10px; }
    .tools .tl { display: inline-flex; flex-direction: column; gap: 2px; min-width: 184px; text-decoration: none;
      background: var(--bg-primary); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px 13px;
      transition: border-color .2s ease, transform .2s ease; }
    .tools .tl:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
    .tools .tl .nm { font-family: var(--font-body); font-size: .82rem; color: var(--accent-primary); }
    .tools .tl .ds { font-size: .72rem; color: var(--text-muted); line-height: 1.4; }
    .tools .tl.soon { opacity: .5; }  .tools .tl.soon .nm { color: var(--text-muted); }

    /* click a flow icon -> highlight its step circle + matching tool */
    .fstage { cursor: pointer; border-radius: 10px; padding: 4px 4px; transition: background .15s; }
    .fstage:hover { background: rgba(125,227,141,.06); }
    .fstage.hl { background: rgba(125,227,141,.10); }
    .mini .mnode { transition: background .2s, color .2s, border-color .2s, box-shadow .2s; }
    .mini.hl .mnode { background: var(--accent-primary); color: var(--bg-primary); border-color: var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(125,227,141,.18); animation: hlPulse .5s ease; }
    .mini.hl .mt { color: var(--accent-primary); }
    .tools .tl.hl { border-color: var(--accent-primary); background: rgba(125,227,141,.08);
      box-shadow: 0 0 0 1px var(--accent-primary) inset, 0 0 14px rgba(125,227,141,.12); animation: hlPulse .5s ease; }
    @keyframes hlPulse { 0% { transform: scale(1); } 45% { transform: scale(1.07); } 100% { transform: scale(1); } }
    /* tools strip below both columns (full width) */
    .pp-tools { margin-top: var(--space-xl); padding-top: var(--space-lg); border-top: 1px solid var(--border-subtle); }
    .pp-tools .tools-lbl { margin-top: 0; }

    .pp-nav { display: flex; justify-content: space-between; margin-top: var(--space-xl); }
    .pp-nav button { font-family: var(--font-body); font-size: .8rem; color: var(--text-secondary);
      background: transparent; border: 1px solid var(--border-medium); border-radius: 8px; padding: 8px 14px; cursor: pointer; }
    .pp-nav button:hover { color: var(--accent-primary); border-color: var(--accent-primary); }
    .pp-nav button:disabled { opacity: .35; cursor: not-allowed; }

    /* ===== full toolbox at the bottom (live style) ===== */
    .toolbox { margin-top: 64px; }
    .toolbox .tb-head { font-family: var(--font-body); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-primary); margin-bottom: 6px; }
    .toolbox .tb-sub { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 22px; }
    .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
    .tool-card { background: var(--bg-surface); border: 1px solid transparent; border-radius: 12px; padding: 16px 18px; text-decoration: none; color: var(--text-primary); transition: border-color 0.2s ease, transform 0.2s ease; scroll-margin-top: 24px; }
    .tool-card:hover { border-color: var(--border-medium); transform: translateY(-2px); }
    .tool-card.highlight { border-color: var(--accent-primary); }
    .tool-card .tc-name { font-family: var(--font-body); font-size: 0.82rem; color: var(--accent-primary); margin-bottom: 6px; }
    .tool-card .tc-desc { font-size: 0.8rem; line-height: 1.5; color: var(--text-muted); }

    @media (max-width: 760px) { .ppanel { padding: var(--space-lg); } }
  </style>
</head>

  <main>
    <div class="container">

      <section class="page-header fade-in">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="width:64px;height:64px;margin:0 auto var(--space-lg);color:var(--accent-primary);" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

        <p class="tb-sub">Working tools designed for each step of the process.</p>
        <div class="tool-grid" id="tool-grid"></div>
      </section>

    </div>
  </main>

  <footer id="site-footer"></footer>
  <button id="theme-toggle"></button>

      'cost-revenue-model':  { nm: 'cost-revenue-model',  ds: 'cost structure & revenue streams', href: '#' },
      'business-case-builder':{ nm: 'business-case-builder', ds: 'TAM/SOM → multi-year P&L', href: 'business-case-builder/' },
      'business-model-canvas':{ nm: 'business-model-canvas', ds: 'the nine building blocks', href: 'business-model-canvas/' },
      'platform-model-builder':{ nm: 'platform-canvas', ds: 'two-sided model + quick estimate', href: 'business-model-app/' }
    };

    /* ===== phases =====
       flow[] = the live-flow slice for the right column (FA icon stages, vertical)
       tools[] = the cards at the bottom of the left column
       grp: '2' marks the two phases wrapped by the Technical & Financial Discovery bracket
       ctx: dashed + context (still clickable) */
    var PHASES = [
      { id:'p0', pn:'Phase 0', lab:'Idea', tag:'Phase 0 · Ideation', title:'Collect & structure ideas',
        ctx:'Ideas are the fuel of innovation — worth little alone, valuable once captured and shaped. Ideation never stops; it runs in the background of everything else.',
        io:['a raw idea','a press release of the chosen idea'],
        steps:[
          {t:'Collect', d:'Anyone can submit ideas, continuously — no filter at the door.'},
          {t:'Evaluate', d:'Ideas are reviewed periodically against strategy and feasibility.'},
          {t:'Frame', d:'The promising ones are shaped into a clear, specific opportunity.'},
          {t:'Press release', d:'Work backwards: write the press release announcing the finished product — who is it for, what pain does it kill, why would anyone care on launch day? It crystallises the chosen idea into a story worth validating; if it isn’t compelling, the idea isn’t ready — rewrite it before building anything.'}
        ],
        flow:[ {ic:'collect', l:'Collect'}, {ic:'evaluate', l:'Evaluate'}, {ic:'frame', l:'Frame'}, {ic:'press-release', l:'Press Release'}, {ic:'assumptions-table', l:'Assumptions Tracker'} ],
        tools:['press-release-canvas','assumptions-tracker'] },

      { id:'p1', pn:'Phase 1', lab:'Problem', tag:'Phase 1 · Problem validation', title:'Prove the problem is real',
        ctx:'Most products fail because nobody wants them. So before designing anything, validate the pain — is it <strong>frequent, intense and unsolved today?</strong> Problem-first, not product-first; build painkillers, not vitamins.',
        io:['a press release','a prioritised list of validated pains'],
        steps:[
          {t:'Possible user pains', d:'Map every plausible pain the target users might have — broad, unfiltered, hypothesis-driven: who hurts, how often, how badly, and what they do about it today. Each pain enters the assumptions table as an unvalidated hypothesis.'},
          {t:'Validated user pains', d:'Interviews, observation and evidence separate real painkillers from nice-to-have vitamins — a pain is validated only when real users confirm it’s frequent, intense and currently unsolved, not when it merely sounds plausible. Hypotheses become confirmed facts or get killed.'}
        ],
        note:'This is where the <b>assumptions table</b> is born — every pain enters as a hypothesis, classified by impact and uncertainty, and travels every phase after this.',
        flow:[ {ic:'possible-user-pains', l:'Possible User Pains'}, {ic:'assumptions-table', l:'Assumptions Tracker'}, {ic:'validated-user-pains', l:'Validated User Pains'} ],
        tools:['possible-user-pains','assumptions-tracker','value-proposition'].filter(function(x){return TOOLS[x];}) },

      { id:'p21', pn:'Phase 2.1', lab:'Concept', tag:'Phase 2.1 · Conceptualization', title:'Design the solution', grp:'2',
        ctx:'Design the concept that answers the validated pains — and decide what it deliberately <strong>won’t</strong> do. A focused painkiller beats a sprawling multi-tool.',
        io:['validated pains','a concept + ranked specifications'],
        steps:[
          {t:'Concept design', d:'Design the concept that answers the validated pains: what it is, what it does, and what it deliberately does not do — communicated simply. The concept is a hypothesis about the solution, just as the pains were hypotheses about the problem.'},
          {t:'House of Quality', d:'Quality Function Deployment: a structured matrix crossing validated user needs with technical characteristics, scoring the relationships to reveal which requirements actually matter — so the engineering effort goes where it kills pain.'},
          {t:'Competitors & patents', d:'The fight check: who already solves this pain, how well, at what price, and how alternatives score against the same needs — plus a freedom-to-operate scan of the patent landscape. Know the competitive ring before stepping into it.'}
        ],
        flow:[ {ic:'concept-design', l:'Concept Design'}, {ic:'house-of-quality', l:'House of Quality'}, {ic:'competitors-patents', l:'Competitors & Patents'}, {ic:'assumptions-table', l:'Assumptions Tracker'} ],
        tools:['house-of-quality','value-proposition','assumptions-tracker'] },

      { id:'p22', pn:'Phase 2.2', lab:'Business', tag:'Phase 2.2 · Business case', title:'Build the costed picture', grp:'2',
        ctx:'Assemble the costed view a decision-maker needs — what it costs, how it earns, and whether the two are compatible.',
        io:['a concept','a costed business case'],
        steps:[
          {t:'Cost breakdown', d:'CAPEX, OPEX and unit economics for the concept as designed. The goal isn’t accounting precision — it’s discovering whether the cost structure is even compatible with the value the concept creates.'},
          {t:'Revenue streams', d:'How the concept captures value: pricing model, channels, recurring versus one-off revenue, willingness to pay. Every revenue assumption goes straight into the assumptions table for later validation.'},
          {t:'Business case', d:'Everything converges into the single costed picture a decision-maker needs — fundamentals, stakeholders & pains, opportunity size, concept & components, specs, cost breakdown — ending in a multi-year financial plan.'}
        ],
        flow:[ {ic:'cost-breakdown', l:'Cost Breakdown'}, {ic:'revenue-streams', l:'Revenue Streams'}, {ic:'business-case', l:'Business Case'}, {ic:'assumptions-table', l:'Assumptions Tracker'} ],
        tools:['cost-revenue-model','business-model-canvas','platform-model-builder','business-case-builder','assumptions-tracker'] },

      { id:'p3', pn:'Phase 3', lab:'Investor Pitch', tag:'Phase 3 · Investor pitch', title:'Create the documentation, then pitch',
        ctx:'This is where everything consolidates into board-ready documentation — the full business case and the pitch that asks for a decision. The validation plan, the press release and the discovery tree all feed it.',
        io:['a costed business case','a green-lit decision'],
        steps:[
          {t:'Business case', d:'Consolidate every angle — validated pains, concept, specs, costs, financials — into one defensible document the decision-maker can act on.'},
          {t:'Pitch', d:'Present the case to the decision board: the validated pains, the concept, the numbers, and the validation plan that de-risks what remains unknown. The four messages — opportunity, solution, business model, de-risking — and an explicit ask: invest, pivot, or stop.'}
        ],
        flow:[ {ic:'business-case', l:'Business Case'}, {ic:'pitch', l:'Pitch'} ],
        tools:['business-case-builder','press-release-canvas','opportunity-solution-tree','house-of-quality','business-model-canvas','platform-model-builder'] },

      { id:'p4', pn:'Phase 4', lab:'Prototype', tag:'Phase 4 · Prototype & validations', title:'Prototype and validate', ctxFlag:true,
        ctx:'If the pitch is approved, build a prototype and run the experiments from the validation plan — retire the riskiest assumptions before committing further. <em>≈ 3 months.</em>',
        io:['a green-lit plan','de-risked assumptions'],
        steps:[
          {t:'Validation plan', d:'The assumptions table becomes an experiment backlog: for each high-risk assumption, define the test, the metric and the kill criterion. The riskiest get tested first — cheap experiments before expensive commitments.'},
          {t:'Assumptions tracker', d:'Results flow back in — each assumption confirmed or refuted. It’s the connective tissue between discovery and validation: written down explicitly, classified by risk, updated as evidence arrives, and never “done”.'}
        ],
        flow:[ {ic:'validation-plan', l:'Validation Plan'}, {ic:'assumptions-table', l:'Assumptions Tracker'} ],
        tools:['assumptions-tracker','opportunity-solution-tree'] },

      { id:'p5', pn:'Phase 5', lab:'MVP', tag:'Phase 5 · MVP', title:'Ship the MVP', ctxFlag:true,
        ctx:'Ship the minimum viable product to real users and learn from real usage — the smallest thing that still kills the core pain while remaining a good deal for us. <em>≈ 3 months.</em>',
        io:['a validated prototype','real-usage learning'],
        steps:[
          {t:'MVP', d:'Release to real users; let real usage replace assumptions with evidence.'},
          {t:'Keep discovering', d:'The opportunity solution tree keeps running — new opportunities surface, the target keeps moving.'}
        ],
        flow:[ {ic:'mvp', l:'MVP'}, {ic:'opportunity-solution-tree', l:'Keep discovering'} ],
        tools:['opportunity-solution-tree'] }
    ];

    var nav = document.getElementById('phasenav');
    var panel = document.getElementById('ppanel');
    var active = 0;

    /* ---- build the phase rail, wrapping the grp:'2' phases in a bracket ---- */
    (function buildRail() {
      var i = 0;
      while (i < PHASES.length) {
        var p = PHASES[i];
        if (p.grp === '2') {
          // collect the consecutive grp:'2' phases into a wrapping bracket
          var wrap = document.createElement('div');
          wrap.className = 'disc-wrap';
          var lbl = document.createElement('div');
          lbl.className = 'dw-label';
          lbl.textContent = 'Technical & Financial Discovery';
          wrap.appendChild(lbl);
          var row = document.createElement('div');
          row.className = 'dw-row';
          while (i < PHASES.length && PHASES[i].grp === '2') {
            row.appendChild(makeChip(PHASES[i], i));
            i++;
          }
          wrap.appendChild(row);
          wrap.insertAdjacentHTML('beforeend', '<svg class="dw-loop" preserveAspectRatio="none" aria-hidden="true"><polygon class="dw-arrow" points="-6,-8 12,0 -6,8 -2,0"></polygon><path class="dw-comet"></path><polygon class="dw-mover" points="-6,-8 12,0 -6,8 -2,0"></polygon></svg>');
          wrap.addEventListener('click', function () { sweepLoop(wrap.querySelector('.dw-loop')); });
          nav.appendChild(wrap);
        } else {
          var pw = document.createElement('div');
          pw.className = 'pwrap';
          pw.appendChild(makeChip(p, i));
          nav.appendChild(pw);
          i++;
        }
      }
    })();

    /* ---- discovery iteration loop (2.1 ⇄ 2.2): arrows + on-click comet ---- */
    function dwPath(W, H, r) {
      var cx = W / 2;
      // start at bottom-centre (clear of the top label); travel clockwise
      return 'M ' + cx + ' ' + H + ' L ' + r + ' ' + H + ' A ' + r + ' ' + r + ' 0 0 1 0 ' + (H - r) +
             ' L 0 ' + r + ' A ' + r + ' ' + r + ' 0 0 1 ' + r + ' 0' +
             ' L ' + (W - r) + ' 0 A ' + r + ' ' + r + ' 0 0 1 ' + W + ' ' + r +
             ' L ' + W + ' ' + (H - r) + ' A ' + r + ' ' + r + ' 0 0 1 ' + (W - r) + ' ' + H +
             ' L ' + cx + ' ' + H + ' Z';
    }
    function drawLoop() {
      var wrap = document.querySelector('.disc-wrap'); if (!wrap) return;
      var svg = wrap.querySelector('.dw-loop'); if (!svg) return;
      var W = wrap.offsetWidth, H = wrap.offsetHeight; if (W < 20 || H < 20) return;
      var d = dwPath(W, H, 12);
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      var comet = svg.querySelector('.dw-comet'); comet.setAttribute('d', d);
      var arrow = svg.querySelector('.dw-arrow');
      if (arrow) {
        var p = comet.getPointAtLength(0), q = comet.getPointAtLength(2);   // start = bottom-centre
        var a = Math.atan2(q.y - p.y, q.x - p.x) * 180 / Math.PI;
        arrow.setAttribute('transform', 'translate(' + p.x + ' ' + p.y + ') rotate(' + a + ')');
      }
    }
    function sweepLoop(svg) {
      if (!svg) return;
      var path = svg.querySelector('.dw-comet'), mover = svg.querySelector('.dw-mover'), arrow = svg.querySelector('.dw-arrow');
      if (!path || !mover) return;
      var L = path.getTotalLength(); if (!L) return;
      if (svg.__dwRaf) cancelAnimationFrame(svg.__dwRaf);
      if (arrow) arrow.style.opacity = '0';                 // resting arrow hides while the mover travels
      var dur = 2400, start = performance.now();
      function frame(now) {
        var t = (now - start) / dur;
        if (t >= 1) { mover.style.opacity = 0; if (arrow) arrow.style.opacity = ''; svg.__dwRaf = null; return; }
        var te = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;   // ease-in-out
        var dist = te * L;
        var p = path.getPointAtLength(dist), q = path.getPointAtLength(Math.min(dist + 1, L));
        var a = Math.atan2(q.y - p.y, q.x - p.x) * 180 / Math.PI;
        mover.setAttribute('transform', 'translate(' + p.x + ' ' + p.y + ') rotate(' + a + ')');
        mover.style.opacity = 1;
        svg.__dwRaf = requestAnimationFrame(frame);
      }
      svg.__dwRaf = requestAnimationFrame(frame);
    }
    requestAnimationFrame(function () { requestAnimationFrame(drawLoop); });
    window.addEventListener('load', drawLoop);
    window.addEventListener('resize', function () { clearTimeout(window.__dwT); window.__dwT = setTimeout(drawLoop, 150); });

    function makeChip(p, idx) {
      var b = document.createElement('button');
      b.className = 'pbox' + (p.ctxFlag ? ' ctx' : '');
      b.setAttribute('data-i', idx);
      b.innerHTML = '<div class="pn">' + p.pn + '</div><div class="nm">' + p.lab + '</div>';
      b.addEventListener('click', function () { setActive(idx); });
      return b;
    }

    function toolCard(id) {
      var t = TOOLS[id]; if (!t) return '';
      if (t.soon) return '<span class="tl soon" data-tool="' + id + '"><span class="nm">' + t.nm + '</span><span class="ds">' + t.ds + '</span></span>';
      return '<a class="tl" data-tool="' + id + '" href="' + t.href + '" target="_blank" rel="noopener"><span class="nm">' + t.nm + '</span><span class="ds">' + t.ds + '</span></a>';
    }

    var ARROW = '<div class="farrow"><svg viewBox="0 0 16 16"><path d="M8 2v9M3 8l5 5 5-5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';

    // flow-icon → tool-card key (icon ids differ from tool keys)
    var IC_TOOL = { 'press-release':'press-release-canvas', 'assumptions-table':'assumptions-tracker',
      'house-of-quality':'house-of-quality', 'business-case':'business-case-builder',
      'cost-breakdown':'cost-revenue-model', 'revenue-streams':'cost-revenue-model',
      'opportunity-solution-tree':'opportunity-solution-tree', 'value-proposition':'value-proposition' };
    function norm(s) { return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim(); }
    function stepIndexFor(p, label) { var n = norm(label); for (var k = 0; k < p.steps.length; k++) { if (norm(p.steps[k].t) === n) return k; } return -1; }

    function flowColumn(p) {
      if (!p.flow || !p.flow.length) return '';
      var inner = p.flow.map(function (f, k) {
        var si = stepIndexFor(p, f.l), tool = IC_TOOL[f.ic] || '';
        var stage = '<div class="fstage" role="button" tabindex="0" data-step="' + si + '" data-tool="' + tool + '">' + faIcon(f.ic) + '<div class="fl">' + f.l + '</div></div>';
        return stage + (k < p.flow.length - 1 ? ARROW : '');
      }).join('');
      return '<div class="flowcol"><div class="fc-lbl">process flow · this phase</div><div class="fc-stages">' + inner + '</div></div>';
    }

    function pulse(el) { if (!el) return; el.classList.remove('hl'); void el.offsetWidth; el.classList.add('hl'); }
    function highlightFromStage(st) {
      Array.prototype.forEach.call(panel.querySelectorAll('.fstage.hl, .mini.hl, .tl.hl'), function (el) { el.classList.remove('hl'); });
      pulse(st);
      var si = st.getAttribute('data-step'), tool = st.getAttribute('data-tool');
      if (si && si !== '-1') pulse(panel.querySelector('.mini[data-step="' + si + '"]'));
      if (tool) pulse(panel.querySelector('.tl[data-tool="' + tool + '"]'));
    }

    function render(i) {
      var p = PHASES[i];
      var left = '<div class="pp-col-left">'
        + '<div class="pp-tag">' + p.tag + '</div>'
        + '<div class="pp-title">' + p.title + '</div>'
        + '<p class="pp-ctx">' + p.ctx + '</p>'
        + '<div class="io"><span class="lbl">in</span><span class="in">' + p.io[0] + '</span><span class="arrow">→</span><span class="lbl">out</span><span class="out">' + p.io[1] + '</span></div>'
        + '<div class="miniflow">' + p.steps.map(function (s, k) {
            return '<div class="mini" data-step="' + k + '"><span class="mnode">' + (k + 1) + '</span><div class="mt">' + s.t + '</div><div class="md">' + s.d + '</div></div>';
          }).join('') + '</div>';
      if (p.note) left += '<div class="anote">' + p.note + '</div>';
      left += '</div>';

      var tools = '';
      if (p.tools && p.tools.length) tools = '<div class="pp-tools"><div class="tools-lbl">tools for this phase</div><div class="tools">' + p.tools.map(toolCard).join('') + '</div></div>';

      var html = '<div class="pp-grid">' + left + flowColumn(p) + '</div>'
        + tools
        + '<div class="pp-nav">'
        + '<button id="pp-prev"' + (i === 0 ? ' disabled' : '') + '>‹ ' + (i > 0 ? PHASES[i-1].lab : '') + '</button>'
        + '<button id="pp-next"' + (i === PHASES.length - 1 ? ' disabled' : '') + '>' + (i < PHASES.length - 1 ? PHASES[i+1].lab : '') + ' ›</button>'
        + '</div>';
      panel.innerHTML = html;
      var prev = document.getElementById('pp-prev'), next = document.getElementById('pp-next');
      if (prev) prev.addEventListener('click', function () { setActive(i - 1); });
      if (next) next.addEventListener('click', function () { setActive(i + 1); });
      Array.prototype.forEach.call(panel.querySelectorAll('.fstage'), function (st) {
        st.addEventListener('click', function () { highlightFromStage(st); });
        st.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); highlightFromStage(st); } });
      });
    }

    function setActive(i) {
      if (i < 0 || i >= PHASES.length) return;
      active = i;
      Array.prototype.forEach.call(nav.querySelectorAll('.pbox'), function (b) {
        b.classList.toggle('on', +b.getAttribute('data-i') === i);
      });
      panel.classList.add('swap');
      setTimeout(function () { render(i); panel.classList.remove('swap'); }, 160);
    }

    /* ---- full toolbox at the bottom ---- */
    var grid = document.getElementById('tool-grid');
    Object.keys(TOOLS).forEach(function (id) {
      var t = TOOLS[id];
      var a = document.createElement('a');
      a.className = 'tool-card';
      a.id = 'tool-' + id;
      a.href = t.href;
      if (t.href !== '#') { a.target = '_blank'; a.rel = 'noopener'; }
      a.innerHTML = '<div class="tc-name">' + t.nm + '</div><div class="tc-desc">' + t.ds + '</div>';
      grid.appendChild(a);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') setActive(active + 1);
      else if (e.key === 'ArrowLeft') setActive(active - 1);
    });

    setActive(0);
  })();
  </script>
</body>
