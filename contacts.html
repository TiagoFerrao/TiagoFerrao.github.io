<!DOCTYPE html>
<html lang="en" data-theme="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#001a20">
  <title>Contact | Tiago Ferrão</title>
  <meta name="description" content="Get in touch with Tiago Ferrão">
  <link rel="icon" href="img/bee.png">
  <link rel="apple-touch-icon" href="img/bee.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Contact | Tiago Ferrão">
  <meta property="og:description" content="Get in touch with Tiago Ferrão">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ferrao.me/contacts.html">
  <meta property="og:image" content="https://ferrao.me/img/social_banner.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="628">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact | Tiago Ferrão">
  <meta name="twitter:description" content="Get in touch with Tiago Ferrão">
  <meta name="twitter:image" content="https://ferrao.me/img/social_banner.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/landing.css">
</head>

<body>
  <!-- ============================================
       HEADER — injected by js/header.js
       ============================================ -->
  <header id="site-header"></header>

  <!-- ============================================
       MAIN — page content
       ============================================ -->
  <main>
    <div class="container">

      <!-- Page Header -->
      <section class="page-header fade-in">
        <h2>Get in Touch</h2>
        <p>Glad to hear from professionals, researchers, students, and organisations working in innovation, data, and AI — whether for a conversation, a project, or a speaking engagement.</p>
      </section>

      <!-- Contact — the site terminal, pre-seeded with `cat contact.txt`; prompt stays live -->
      <section class="lp-term-wrap fade-in">
        <div class="lp-term" id="lp-term" data-init="cat contact.txt" aria-label="Interactive terminal">
          <div class="lp-term-bar">
            <span class="lp-dots" aria-hidden="true"><i></i><i></i><i></i></span>
            <span class="lp-term-path">~/ — ferrao.me</span>
          </div>
          <div class="lp-term-body">
            <div class="lp-out" id="lp-out" aria-live="polite"></div>
            <div class="lp-line">
              <span class="lp-ps1">tiago@ferrao.me:~$</span>
              <input class="lp-inp" id="lp-inp" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Terminal input" placeholder="type a command, or ask me anything…">
            </div>
            <div class="lp-chips">try:
              <button class="lp-chip">ls</button>
              <button class="lp-chip">cat cv</button>
              <button class="lp-chip">about</button>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- ============================================
       FOOTER — injected by js/footer.js
       ============================================ -->
  <footer id="site-footer"></footer>

  <!-- ============================================
       THEME TOGGLE — injected by js/theme-toggle.js (handler in js/main.js)
       ============================================ -->
  <button id="theme-toggle"></button>

  <!-- ============================================
       SCRIPTS
       ============================================ -->
  <script src="js/header.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
  <script src="js/terminal.js"></script>
</body>
</html>
