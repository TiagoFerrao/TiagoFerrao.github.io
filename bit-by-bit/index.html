<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../img/bee.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bit by Bit · an AI literacy primer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#001a20;
    --ink-2:#002a33;
    --panel:#063139;
    --panel-2:#0a414c;
    --line:#15505e;
    --cream:#e0f0e8;
    --muted:#8fb8a0;
    --amber:#ffb24d;
    --amber-deep:#f2933a;
    --mint:#7DE38D;
    --mint-deep:#3fc594;
    --coral:#ff7d6b;
    --glow: var(--amber);
    --r:18px;
    --display:"Space Grotesk", "Segoe UI", system-ui, sans-serif;
    --mono:"Inconsolata", ui-monospace, "SF Mono", Menlo, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--display);
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(255,178,77,.10), transparent 60%),
      radial-gradient(900px 700px at -10% 110%, rgba(125,227,141,.08), transparent 55%),
      var(--ink);
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
    font-size:18px;
    line-height:1.65;
    min-height:100vh;
  }
  a{color:inherit;}
  button{font-family:inherit;}
  .mono{font-family:var(--mono);}
  .eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

  /* ---------- BIT, the mascot ---------- */
  .device{
    width:170px;height:158px;position:relative;margin:0 auto;border-radius:26px;
    background:linear-gradient(160deg,var(--panel-2),var(--ink-2));
    border:1px solid var(--line);
    box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    padding:16px 16px 12px;
    transition:box-shadow .6s ease, transform .3s ease;
  }
  .device.sm{width:120px;height:112px;border-radius:18px;padding:11px 11px 8px;}
  .device::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
    width:64px;height:10px;border-radius:0 0 10px 10px;
    background:linear-gradient(var(--panel),var(--ink-2));border:1px solid var(--line);border-top:none;}
  .device.sm::after{width:46px;height:8px;}
  .screen{position:relative;width:100%;height:104px;border-radius:14px;
    background:radial-gradient(120% 120% at 50% 30%, #11202a, #0c1820);
    border:1px solid #0a141b;overflow:hidden;
    box-shadow: inset 0 0 28px rgba(0,0,0,.6), 0 0 0 0 var(--glow);
    transition: box-shadow .6s ease;}
  .device.sm .screen{height:70px;border-radius:10px;}
  .device[data-mood] .screen{box-shadow: inset 0 0 28px rgba(0,0,0,.6), 0 0 26px -4px var(--glow);}
  .scanlines{position:absolute;inset:0;background:repeating-linear-gradient(transparent 0 3px, rgba(0,0,0,.18) 3px 4px);pointer-events:none;opacity:.5;}
  .face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .device.sm .face svg{transform:scale(.74);}
  .face svg{filter:drop-shadow(0 0 6px var(--glow));}
  .device-led{position:absolute;top:9px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--glow);box-shadow:0 0 8px var(--glow);}
  .device.sm .device-led{top:7px;right:10px;width:6px;height:6px;}
  .device-label{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.34em;color:var(--muted);margin-top:9px;}
  .device.sm .device-label{font-size:9px;margin-top:6px;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);}96%{transform:scaleY(.1);}}
  .eyes{transform-origin:center;animation:blink 5.2s infinite;}
  @keyframes hop{0%,100%{transform:translateY(0);}30%{transform:translateY(-10px);}55%{transform:translateY(0);}}
  .device.hop{animation:hop .55s ease;}
  .device[data-mood="0"]{--glow:#6c7f88;}
  .device[data-mood="1"]{--glow:var(--amber-deep);}
  .device[data-mood="2"]{--glow:var(--amber);}
  .device[data-mood="3"]{--glow:var(--mint-deep);}
  .device[data-mood="4"]{--glow:var(--mint);}

  /* ---------- SHELL ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
    max-width:900px;margin:0 auto;padding:22px 24px 16px;border-bottom:1px solid var(--line);}
  .brand{display:inline-flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;
    color:var(--cream);font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.01em;padding:6px 4px;border-radius:8px;}
  .brand:hover,.brand:focus-visible{color:var(--amber);outline:none;}
  .brand-dot{width:15px;height:15px;border-radius:4px;background:linear-gradient(150deg,var(--amber),var(--mint));box-shadow:0 0 8px rgba(255,178,77,.5);}
  .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
  .pill{background:none;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:13px;
    letter-spacing:.04em;padding:8px 13px;border-radius:9px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .pill:hover,.pill:focus-visible{border-color:var(--amber);color:var(--cream);outline:none;}
  .langtog{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .langtog button{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:8px 11px;cursor:pointer;}
  .langtog button.on{background:var(--amber);color:var(--ink);font-weight:700;}
  .langtog button:not(.on):hover{color:var(--cream);}

  .stage{max-width:900px;margin:0 auto;padding:34px 24px 90px;}
  .screen-view{display:none;}
  .screen-view.live{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* ---------- HUB ---------- */
  .hub-head{display:flex;gap:26px;align-items:center;flex-wrap:wrap;justify-content:center;text-align:center;margin-bottom:14px;}
  .hub-meter{flex:1;min-width:240px;max-width:340px;}
  .hub-intro h1{font-size:clamp(40px,7vw,60px);font-weight:700;letter-spacing:-.03em;margin:14px 0 4px;line-height:1;}
  .hub-intro h1 span{color:var(--amber);}
  .meter-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
  .meter-top .lab{font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:var(--muted);}
  .meter-top .pct{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--cream);}
  .bar{height:13px;border-radius:99px;background:var(--ink-2);overflow:hidden;border:1px solid var(--line);}
  .bar i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--amber),var(--mint));transition:width .7s cubic-bezier(.2,.7,.3,1);}
  .meter-cap{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px;}
  .bit-says{font-family:var(--mono);font-size:15px;color:var(--mint);
    background:rgba(125,227,141,.07);border:1px solid rgba(125,227,141,.22);border-radius:12px;
    padding:11px 16px;display:inline-block;margin:18px auto 4px;max-width:54ch;}
  .bit-says b{color:var(--cream);font-weight:500;}
  .hub-help{color:var(--muted);font-size:16px;max-width:52ch;margin:10px auto 0;text-align:center;}

  .hub-list{display:flex;flex-direction:column;gap:10px;margin-top:30px;}
  .hub-card{display:flex;align-items:center;gap:16px;width:100%;cursor:pointer;text-align:left;
    background:var(--panel);border:1px solid var(--line);color:var(--cream);border-radius:14px;padding:16px 18px;transition:.16s;}
  .hub-card:hover,.hub-card:focus-visible{border-color:var(--amber);background:var(--panel-2);transform:translateX(3px);outline:none;}
  .hub-num{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink);background:var(--amber);
    width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;}
  .hub-card.done .hub-num{background:var(--mint);}
  .hub-ct{flex:1;min-width:0;}
  .hub-title{font-size:18px;font-weight:600;}
  .hub-ct small{display:block;color:var(--muted);font-size:13.5px;font-weight:400;}
  .hub-go{font-family:var(--mono);font-size:13px;color:var(--muted);flex:none;}
  .hub-card.done .hub-go{color:var(--mint);}

  /* ---------- LESSON ---------- */
  .lesson-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px;}
  .lesson-top .eyebrow{flex:1;}
  .steps{display:flex;gap:7px;align-items:center;}
  .steps .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-2);border:1.5px solid var(--line);transition:.2s;}
  .steps .dot.done{background:var(--mint);border-color:var(--mint);}
  .steps .dot.cur{border-color:var(--amber);box-shadow:0 0 0 4px rgba(255,178,77,.12);}
  .lesson-title{font-size:clamp(28px,4.5vw,40px);font-weight:700;letter-spacing:-.02em;margin:4px 0 22px;line-height:1.05;}

  .concept{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;}
  .concept .k{font-family:var(--mono);font-size:13px;color:var(--amber);letter-spacing:.04em;margin-bottom:8px;}
  .concept h3{margin:0 0 10px;font-size:23px;font-weight:600;line-height:1.2;}
  .concept p{margin:0;color:#d4dde2;font-size:18.5px;line-height:1.6;}
  .concept .ex{margin-top:16px;font-size:16px;color:var(--muted);border-top:1px dashed var(--line);padding-top:14px;}
  .concept .ex b{color:var(--mint);font-weight:600;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;display:inline-block;margin-right:6px;}
  .concept.aid{background:var(--ink-2);border-style:dashed;margin-top:14px;}
  .concept.aid .k{color:var(--mint);}
  .concept.aid svg{display:block;}

  .quiz-h{display:flex;align-items:center;gap:12px;margin:0 0 18px;}
  .quiz-h .rule{flex:1;height:1px;background:var(--line);}
  .q{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;}
  .q .qt{font-weight:600;font-size:18px;margin:0 0 14px;display:flex;gap:10px;line-height:1.35;}
  .q .qt .qn{font-family:var(--mono);color:var(--amber);font-size:15px;flex:none;}
  .opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;cursor:pointer;
    background:var(--ink-2);border:1px solid var(--line);color:var(--cream);border-radius:11px;padding:13px 15px;margin-top:9px;font-size:16.5px;transition:.15s;}
  .opt:hover:not(:disabled){border-color:var(--muted);}
  .opt:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  .opt .mk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;margin-top:1px;}
  .opt.correct{border-color:var(--mint);background:rgba(125,227,141,.12);}
  .opt.correct .mk{background:var(--mint);border-color:var(--mint);color:var(--ink);}
  .opt.wrong{border-color:var(--coral);background:rgba(255,125,107,.1);}
  .opt.wrong .mk{background:var(--coral);border-color:var(--coral);color:var(--ink);}
  .opt:disabled{cursor:default;opacity:.9;}
  .opt.correct:disabled,.opt.wrong:disabled{opacity:1;}
  .why{margin-top:12px;font-size:16px;color:#d4dde2;background:var(--ink-2);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:13px 16px;display:none;}
  .why.show{display:block;}
  .why b{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;display:block;margin-bottom:3px;}

  .lesson-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:26px;}
  .step-count,.score-chip{font-family:var(--mono);font-size:14px;color:var(--muted);}
  .score-chip b{color:var(--cream);}
  .cta{display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:none;
    background:var(--amber);color:var(--ink);font-weight:700;font-size:16px;padding:13px 24px;border-radius:12px;transition:.18s;text-decoration:none;}
  .cta:hover{background:#ffc16b;transform:translateY(-1px);}
  .cta:disabled{background:var(--panel-2);color:var(--muted);cursor:not-allowed;transform:none;}
  .cta.ghost{background:transparent;border:1px solid var(--line);color:var(--cream);font-weight:500;}
  .cta.ghost:hover{border-color:var(--amber);background:transparent;}

  /* ---------- VISUALS (aides) ---------- */
  .viz{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin:16px 0 2px;}
  .viz-h{font-size:16px;font-weight:600;margin:0 0 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .viz-h .mono{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);background:rgba(255,178,77,.1);padding:3px 8px;border-radius:6px;}
  .viz-foot{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:14px;line-height:1.55;}
  .ntk-sentence{font-size:19px;margin-bottom:16px;color:var(--cream);}
  .ntk-blank{color:var(--amber);border-bottom:2px solid var(--amber);padding:0 7px;margin-left:2px;}
  .ntk-bars{display:flex;flex-direction:column;gap:7px;}
  .ntk-row{display:flex;align-items:center;gap:10px;}
  .ntk-tok{width:62px;text-align:right;font-family:var(--mono);font-size:14px;color:var(--muted);flex:none;}
  .ntk-track{flex:1;height:22px;background:var(--ink);border:1px solid var(--line);border-radius:6px;overflow:hidden;}
  .ntk-fill{height:100%;background:linear-gradient(90deg,var(--amber-deep),var(--amber));transition:background .25s;}
  .ntk-row.pick .ntk-fill{background:linear-gradient(90deg,var(--mint-deep),var(--mint));}
  .ntk-row.pick .ntk-tok{color:var(--mint);font-weight:700;}
  .ntk-prob{width:42px;font-family:var(--mono);font-size:13px;color:var(--muted);flex:none;}
  .ntk-btn{background:var(--amber);color:var(--ink);border:none;font-family:var(--display);font-weight:700;font-size:14px;padding:10px 17px;border-radius:10px;cursor:pointer;}
  .ntk-btn:hover{background:#ffc16b;}
  .ntk-note{display:block;margin-top:8px;}
  .flow{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;}
  .flow-node{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 11px;font-size:14.5px;display:flex;align-items:center;justify-content:center;text-align:center;}
  .flow-node.accent{border-color:var(--mint);background:rgba(125,227,141,.1);color:var(--mint);}
  .flow-arr{display:flex;align-items:center;color:var(--amber);font-family:var(--mono);font-size:18px;}
  @media(max-width:560px){.flow{flex-direction:column;}.flow-arr{transform:rotate(90deg);align-self:center;}}
  .sec-row{display:flex;align-items:center;gap:10px;font-size:15px;padding:13px 15px;border-radius:12px;margin-top:8px;border:1px solid var(--line);background:var(--panel);}
  .sec-row.ok{border-color:rgba(125,227,141,.45);}
  .sec-row.bad{border-color:rgba(255,125,107,.45);}
  .sec-tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 7px;border-radius:5px;flex:none;}
  .sec-row.ok .sec-tag{background:var(--mint);color:var(--ink);}
  .sec-row.bad .sec-tag{background:var(--coral);color:var(--ink);}
  .sec-row.bad s{color:var(--muted);}
  .sec-x{color:var(--coral);font-family:var(--mono);font-size:12px;margin-left:auto;white-space:nowrap;}
  .tree{display:flex;flex-direction:column;}
  .tree-step{display:flex;align-items:center;gap:12px;}
  .tree-q{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 15px;font-size:15px;}
  .tree-yes{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink);background:var(--mint);padding:9px 13px;border-radius:10px;white-space:nowrap;}
  .tree-no{font-family:var(--mono);font-size:11px;color:var(--muted);padding:6px 0 6px 4px;}

  /* ---------- OVERLAY (cheer / finale) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,15,18,.86);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .overlay.show{display:flex;}
  .overlay-card{max-width:470px;width:100%;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:34px 30px;position:relative;animation:fade .3s ease;}
  .overlay-card h2{font-size:30px;font-weight:700;margin:18px 0 6px;}
  .overlay-card h2 span{color:var(--mint);}
  .ov-sub{color:var(--muted);margin:0 0 6px;font-size:17px;}
  .ov-meter{font-family:var(--mono);font-size:14px;color:var(--muted);margin:10px 0 22px;}
  .ov-meter b{color:var(--mint);}
  .ov-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .badge{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);
    background:linear-gradient(90deg,var(--amber),var(--mint));display:inline-block;padding:8px 16px;border-radius:99px;font-weight:700;margin:14px 0 18px;}
  .spark{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;}

  @media (max-width:620px){
    .hub-head{gap:14px;}
    .concept{padding:20px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<div class="topbar">
  <button class="brand" id="btn-home" aria-label="Bit by Bit — sections"><span class="brand-dot"></span> Bit by Bit</button>
  <div class="top-actions">
    <div class="langtog" id="langtog" role="group" aria-label="Language">
      <button data-l="en">EN</button>
      <button data-l="pt">PT</button>
    </div>
    <a class="pill" href="../digital.html">‹ ferrao.me</a>
    <button class="pill" id="btn-restart">↺ start over</button>
  </div>
</div>

<main class="stage">

  <!-- ============ HUB ============ -->
  <section id="hub" class="screen-view live">
    <div class="hub-head">
      <div class="device" id="bit-hub" data-mood="0" aria-hidden="true">
        <span class="device-led"></span>
        <div class="screen"><div class="scanlines"></div><div class="face"></div></div>
        <div class="device-label">B · I · T</div>
      </div>
      <div class="hub-meter">
        <div class="meter-top"><span class="lab" id="hub-lit">LITERACY</span><span class="pct" id="hub-pct">0%</span></div>
        <div class="bar"><i id="hub-bar"></i></div>
        <div class="meter-cap" id="hub-cap"></div>
      </div>
    </div>
    <div class="hub-intro" style="text-align:center;">
      <div class="eyebrow" id="hub-primer"></div>
      <h1>Bit by <span>Bit</span></h1>
      <p class="bit-says mono" id="hub-says"></p>
      <p class="hub-help" id="hub-help"></p>
    </div>
    <div class="hub-list" id="hub-list"></div>
  </section>

  <!-- ============ LESSON ============ -->
  <section id="lesson" class="screen-view">
    <div class="lesson-top">
      <button class="pill" id="btn-back">‹ sections</button>
      <span class="eyebrow" id="ls-eyebrow"></span>
      <div class="steps" id="ls-steps"></div>
    </div>
    <h2 class="lesson-title" id="ls-title"></h2>
    <div id="ls-body"></div>
    <div class="lesson-foot" id="ls-foot"></div>
  </section>

</main>

<!-- ============ OVERLAY ============ -->
<div class="overlay" id="overlay"><div class="overlay-card" id="overlay-card"></div></div>

<script>
/* ---------------- FACES ---------------- */
function faceSVG(mood){
  const faces={
    0:`<svg width="92" height="56" viewBox="0 0 92 56"><g stroke="#7d8f98" stroke-width="4" stroke-linecap="round" fill="none">
        <path d="M22 24 h12"/><path d="M58 24 h12"/><path d="M36 40 q10 4 20 0"/></g></svg>`,
    1:`<svg width="92" height="56" viewBox="0 0 92 56"><g fill="#f2933a"><circle cx="30" cy="24" r="5"/><circle cx="62" cy="24" r="5"/></g>
        <path d="M34 38 q12 5 24 0" stroke="#f2933a" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`,
    2:`<svg width="92" height="56" viewBox="0 0 92 56"><g class="eyes" fill="#ffb24d"><circle cx="30" cy="22" r="5.5"/><circle cx="62" cy="22" r="5.5"/></g>

const COURSE_EN = [
  {title:"Foundations", eyebrow:"Section 01 · how it works",
    concepts:[
      {k:"how it works", h:"A prediction machine", p:"An LLM doesn’t look anything up. It reads the text so far and predicts the most likely next chunk of text, adds it, then repeats — one chunk at a time, left to right. There is no database and no plan for where the sentence ends. Everything it does, brilliant or wrong, comes from this single move: guessing what comes next.", ex:"Fluency isn’t knowledge. Sounding right and being right are two different things."},
      {k:"the unit", h:"Tokens, not words", p:"The chunks it predicts are tokens — roughly 3–4 characters of English, not whole words. “Unbelievable” might be three tokens; a space or a comma is a token too. The model never sees individual letters, which is why asking it to count the r’s in “strawberry” can trip it up. Every size limit and every bill is measured in tokens.", ex:"When it fumbles spelling or counting letters, remember: it sees tokens, not letters.", fig:`<svg viewBox="0 0 520 132" width="100%" style="max-width:100%;height:auto;margin-top:6px"><text x="14" y="32" font-family="var(--mono)" font-size="13" fill="var(--muted)">“unbelievable”</text><rect x="150" y="14" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="192" y="32" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">un</text><rect x="242" y="14" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="284" y="32" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">believ</text><rect x="334" y="14" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="376" y="32" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">able</text><text x="14" y="86" font-family="var(--mono)" font-size="13" fill="var(--muted)">“strawberry”</text><rect x="150" y="68" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="192" y="86" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">str</text><rect x="242" y="68" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="284" y="86" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">aw</text><rect x="334" y="68" width="84" height="26" rx="6" fill="var(--ink)" stroke="var(--amber)"/><text x="376" y="86" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">berry</text><text x="14" y="122" font-family="var(--mono)" font-size="11" fill="var(--mint)">≈ 3–4 characters per token — it never sees single letters</text></svg>`},
      {k:"its memory", h:"The context window", p:"Everything the model can see at once — your prompt, the earlier conversation, any pasted documents, and its own reply in progress — shares one budget measured in tokens. A 200K context window is that ceiling. Go past it and the oldest text falls off the edge, which is why a long chat can seem to forget how it began. Nothing carries into a new chat unless you bring it back.", ex:"If it “forgot” something, it probably scrolled out of the window. Re-paste what matters.", fig:`<svg viewBox="0 0 520 152" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="120" y="16" width="280" height="116" rx="10" fill="none" stroke="var(--line)" stroke-dasharray="5 4"/><rect x="138" y="3" width="244" height="22" rx="5" fill="var(--ink)" stroke="var(--muted)" opacity="0.5"/><text x="260" y="18" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">oldest text — scrolling off ↑</text><rect x="138" y="34" width="244" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="48" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">your prompt</text><rect x="138" y="58" width="244" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="72" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">earlier turns</text><rect x="138" y="82" width="244" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="96" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">pasted docs</text><rect x="138" y="106" width="244" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="120" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">reply so far</text><text x="260" y="146" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">one shared budget (e.g. 200K tokens)</text></svg>`},
      {k:"frozen in time", h:"Training & the knowledge cutoff", p:"The model learned its patterns once, up to a fixed knowledge cutoff date; using it just computes a fresh answer from those frozen patterns. It has no built-in knowledge of anything after that date, and it isn’t on the internet unless a tool connects it. So a confident claim about last week can’t have come from training — only from a live tool.", ex:"Anything recent needs a tool. The base model can’t have seen it.", fig:`<svg viewBox="0 0 520 116" width="100%" style="max-width:100%;height:auto;margin-top:6px"><line x1="20" y1="60" x2="500" y2="60" stroke="var(--line)" stroke-width="1.3"/><rect x="20" y="50" width="320" height="20" rx="4" fill="var(--mint)" opacity="0.22"/><line x1="340" y1="40" x2="340" y2="80" stroke="var(--amber)" stroke-width="2"/><text x="340" y="34" font-family="var(--mono)" font-size="11" fill="var(--amber)" text-anchor="middle">knowledge cutoff</text><text x="180" y="98" font-family="var(--mono)" font-size="12" fill="var(--mint)" text-anchor="middle">learned up to here</text><path d="M340 60 H500" stroke="var(--muted)" stroke-width="1.2" stroke-dasharray="5 5"/><circle cx="472" cy="60" r="4" fill="var(--cream)"/><text x="472" y="98" font-family="var(--mono)" font-size="12" fill="var(--muted)" text-anchor="middle">today — “?”</text><text x="420" y="48" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">needs a tool</text></svg>`},
      {k:"the failure mode", h:"Hallucination & temperature", p:"Because it produces plausible text, a model can state false information — even invent a realistic-looking source — with total confidence. This isn’t lying; it’s the prediction machinery producing something that reads well but happens to be wrong. A second dial, temperature, sets randomness: low is focused and repeatable (facts, code), high is varied and creative (brainstorming).", ex:"Confidence is not evidence. Verify anything that matters.", fig:`<svg viewBox="0 0 520 128" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="18" y="16" width="212" height="96" rx="10" fill="var(--ink)" stroke="var(--line)"/><text x="124" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">low temperature</text><text x="124" y="68" font-family="var(--mono)" font-size="16" fill="var(--mint)" text-anchor="middle">2 + 2 = 4</text><text x="124" y="92" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">steady · same each time</text><rect x="290" y="16" width="212" height="96" rx="10" fill="var(--ink)" stroke="var(--amber)"/><text x="396" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">high temperature</text><text x="396" y="64" font-family="var(--mono)" font-size="13" fill="var(--amber)" text-anchor="middle">six playful names…</text><text x="396" y="90" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">varied · different each run</text><text x="260" y="70" font-family="var(--mono)" font-size="20" fill="var(--muted)" text-anchor="middle">⇄</text></svg>`}

  {title:"The modern AI stack", eyebrow:"Section 02 · vocabulary",

      {k:"the big picture", h:"One map for the whole stack", p:"Almost every AI term names a layer of the same stack. At the bottom sits the model (the trained engine). Wrap it in an API and developers can call it; wrap that in an app and you get the chatbot you click. Give it tools and a goal and it becomes an agent; package reusable know-how and that's a Skill. Same engine underneath — the words just tell you which layer someone means.", ex:"When a term confuses you, ask: which layer of the stack is this?", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="150" y="12" width="220" height="22" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="27" font-family="var(--mono)" font-size="12" fill="var(--cream)" text-anchor="middle">Skill</text><rect x="150" y="38" width="220" height="22" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="53" font-family="var(--mono)" font-size="12" fill="var(--cream)" text-anchor="middle">agent</text><rect x="150" y="64" width="220" height="22" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="79" font-family="var(--mono)" font-size="12" fill="var(--cream)" text-anchor="middle">app</text><rect x="150" y="90" width="220" height="22" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="260" y="105" font-family="var(--mono)" font-size="12" fill="var(--cream)" text-anchor="middle">API</text><rect x="150" y="116" width="220" height="22" rx="6" fill="var(--ink)" stroke="var(--mint)"/><text x="260" y="131" font-family="var(--mono)" font-size="12" fill="var(--mint)" text-anchor="middle">model</text><text x="392" y="27" font-family="var(--mono)" font-size="10" fill="var(--muted)">↑ built on</text><text x="392" y="131" font-family="var(--mono)" font-size="10" fill="var(--muted)">the engine</text></svg>`},
      {k:"three layers you'll hear", h:"Model, API, app", p:"The model is the raw trained engine — Claude, GPT, Gemini. The API is the socket developers call it through, in code. The app is the product built around it that you actually click — Claude.ai, ChatGPT. Same brain; different ways of reaching it.", ex:"“Use the API” means wiring it into software; “use the app” means the website.", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="60" y="14" width="400" height="118" rx="12" fill="none" stroke="var(--line)"/><text x="74" y="32" font-family="var(--mono)" font-size="11" fill="var(--muted)">app · Claude.ai</text><rect x="110" y="42" width="300" height="78" rx="10" fill="none" stroke="var(--muted)" stroke-dasharray="4 3"/><text x="124" y="60" font-family="var(--mono)" font-size="11" fill="var(--muted)">API</text><rect x="168" y="72" width="184" height="40" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="260" y="97" font-family="var(--mono)" font-size="13" fill="var(--mint)" text-anchor="middle">model · Claude</text></svg>`},
      {k:"who it's told to be", h:"The system prompt", p:"Before you type a single word, the assistant has already been handed hidden instructions — its role, tone, and rules. That's the system prompt. Swap it and the same model behaves like a different assistant: a terse coder, a patient tutor, a brand-safe support agent.", ex:"Odd or strict behaviour usually comes from the system prompt, not the model.", fig:`<svg viewBox="0 0 520 130" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="40" y="12" width="440" height="30" rx="8" fill="var(--ink)" stroke="var(--muted)" stroke-dasharray="4 3" opacity="0.7"/><text x="54" y="31" font-family="var(--mono)" font-size="11" fill="var(--muted)">SYSTEM · you are a patient, concise tutor (hidden)</text><rect x="40" y="50" width="300" height="26" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="54" y="67" font-family="var(--mono)" font-size="11" fill="var(--cream)">user: explain tokens</text><rect x="180" y="84" width="300" height="26" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="194" y="101" font-family="var(--mono)" font-size="11" fill="var(--mint)">assistant: sure — think of chunks…</text><text x="260" y="124" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">set once, before you type</text></svg>`},
      {k:"giving it reach", h:"Tool use & RAG", p:"On its own the model has only its frozen training. Tool use lets it call out — a calculator, a search, code — to touch the live, exact world. RAG (retrieval-augmented generation) fetches relevant documents and drops them into the context so it answers from your sources instead of memory. You'll build with both in Section 04; here, just meet the words.", ex:"Tool use reaches out to act; RAG brings your documents in to read."},
      {k:"autonomy", h:"Agents & Skills", p:"An agent pursues a goal across several steps, choosing its own actions in a loop instead of answering once. A Skill is a reusable folder of instructions (and sometimes scripts) telling an agent how to do a specific job well. A chatbot tells you how; an agent goes and does it — and Skills are the playbooks it follows.", ex:"A tool is a capability; a Skill is the know-how for when and how to use it.", fig:`<svg viewBox="0 0 520 128" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="24" y="16" width="210" height="92" rx="10" fill="var(--ink)" stroke="var(--line)"/><text x="129" y="40" font-family="var(--mono)" font-size="12" fill="var(--muted)" text-anchor="middle">tool</text><text x="129" y="66" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">calculator · search · code</text><text x="129" y="92" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">a capability</text><text x="260" y="68" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">vs</text><rect x="286" y="16" width="210" height="92" rx="10" fill="var(--ink)" stroke="var(--amber)"/><text x="391" y="40" font-family="var(--mono)" font-size="12" fill="var(--muted)" text-anchor="middle">Skill</text><text x="391" y="66" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">[ SKILL.md + steps ]</text><text x="391" y="92" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">the know-how</text></svg>`}

  {title:"Prompting craft", eyebrow:"Section 03 · getting better output",
    concepts:[
      {k:"specificity", h:"Vague in, vague out", p:"The single biggest lever is detail. Give the role, the task, the format, the length and the audience. A weak ask leaves the model guessing what you meant; a specific one hands it a target. “Write a 150-word LinkedIn post for B2B founders on one pricing mistake, direct tone” beats “write about marketing.”", ex:"Specific is almost always better than clever.", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><text x="14" y="20" font-family="var(--mono)" font-size="11" fill="var(--muted)">weak</text><rect x="14" y="26" width="492" height="32" rx="8" fill="var(--ink)" stroke="var(--muted)" stroke-dasharray="4 3"/><text x="28" y="46" font-family="var(--mono)" font-size="12" fill="var(--muted)">“write about marketing”</text><text x="14" y="84" font-family="var(--mono)" font-size="11" fill="var(--mint)">strong</text><rect x="14" y="90" width="492" height="48" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="28" y="110" font-family="var(--mono)" font-size="12" fill="var(--cream)">“150-word LinkedIn post · for B2B founders ·</text><text x="28" y="128" font-family="var(--mono)" font-size="12" fill="var(--cream)">one pricing mistake · direct tone”</text></svg>`},
      {k:"examples", h:"Show, don't tell (few-shot)", p:"Including two or three examples of the input→output pattern you want usually beats describing it in adjectives. The model copies the pattern you demonstrate, so a couple of samples in your house style carry more than any description.", ex:"“Write it like THIS” outperforms “write it professionally.”", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><text x="14" y="20" font-family="var(--mono)" font-size="11" fill="var(--muted)">show two examples:</text><rect x="14" y="28" width="320" height="24" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="28" y="44" font-family="var(--mono)" font-size="12" fill="var(--cream)">“great!”  →  positive</text><rect x="14" y="56" width="320" height="24" rx="6" fill="var(--ink)" stroke="var(--line)"/><text x="28" y="72" font-family="var(--mono)" font-size="12" fill="var(--cream)">“awful”  →  negative</text><rect x="14" y="90" width="320" height="24" rx="6" fill="var(--ink)" stroke="var(--mint)"/><text x="28" y="106" font-family="var(--mono)" font-size="12" fill="var(--mint)">“not bad”  →  positive</text><text x="346" y="106" font-family="var(--mono)" font-size="11" fill="var(--muted)">it copies the pattern</text><text x="14" y="138" font-family="var(--mono)" font-size="11" fill="var(--muted)">examples carry what adjectives can't</text></svg>`},
      {k:"format", h:"Ask for the shape", p:"Tell the model exactly how you want the answer — a table, bullet points, JSON, a word count, named sections — and it will comply. Controlling the format makes output more reliable and far easier to reuse downstream.", ex:"“Give me a 3-column table: risk, likelihood, mitigation.”", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><text x="14" y="20" font-family="var(--mono)" font-size="11" fill="var(--muted)">“give me a 3-column table”</text><rect x="14" y="30" width="492" height="96" rx="8" fill="var(--ink)" stroke="var(--line)"/><line x1="178" y1="30" x2="178" y2="126" stroke="var(--line)"/><line x1="342" y1="30" x2="342" y2="126" stroke="var(--line)"/><line x1="14" y1="58" x2="506" y2="58" stroke="var(--line)"/><text x="96" y="49" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">risk</text><text x="260" y="49" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">likelihood</text><text x="424" y="49" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">mitigation</text><text x="96" y="82" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">churn</text><text x="260" y="82" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">medium</text><text x="424" y="82" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">onboarding</text><text x="96" y="108" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">cost</text><text x="260" y="108" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">low</text><text x="424" y="108" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">caching</text></svg>`},
      {k:"reasoning", h:"Ask it to think (chain-of-thought)", p:"For multi-step problems, asking the model to work through it step by step before answering measurably improves accuracy, because it reasons through the intermediate steps instead of blurting a guess.", ex:"Most useful on math, logic and anything with intermediate steps.", fig:`<svg viewBox="0 0 520 140" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="18" y="16" width="212" height="100" rx="10" fill="var(--ink)" stroke="var(--line)"/><text x="124" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">“just answer”</text><text x="124" y="70" font-family="var(--mono)" font-size="15" fill="var(--cream)" text-anchor="middle">≈ 380  ✗</text><text x="124" y="98" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">blurts a guess</text><rect x="290" y="16" width="212" height="100" rx="10" fill="var(--ink)" stroke="var(--mint)"/><text x="396" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">“step by step”</text><text x="396" y="64" font-family="var(--mono)" font-size="12" fill="var(--cream)" text-anchor="middle">23×10 + 23×7 = 230 + 161</text><text x="396" y="86" font-family="var(--mono)" font-size="14" fill="var(--mint)" text-anchor="middle">= 391  ✓</text><text x="396" y="104" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">works it out</text></svg>`},
      {k:"iteration", h:"It's a loop, not a slot machine", p:"Treat the first reply as a draft, not a verdict. Steer it — “tighter,” “drop the jargon,” “now for executives” — and it converges fast. The skill is the back-and-forth, not landing one perfect prompt on the first try.", ex:"A weak first answer usually means one more instruction, not a weak tool.", fig:`<svg viewBox="0 0 520 120" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="12" y="40" width="96" height="34" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="60" y="61" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">draft</text><text x="120" y="61" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="134" y="40" width="110" height="34" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="189" y="61" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">“tighter”</text><text x="256" y="61" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="270" y="40" width="130" height="34" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="335" y="61" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">“for execs”</text><text x="412" y="61" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="426" y="40" width="80" height="34" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="466" y="61" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">done</text><text x="260" y="100" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">a dialogue, not one shot</text></svg>`}
    ],
    quiz:[
      {q:"Which prompt will most likely give a usable result?", opts:["“Write something about marketing.”","“Write a 150-word, direct LinkedIn post for B2B founders on one pricing mistake.”","“Write a really good marketing thing, professionally.”"], a:1, why:"Role, length, audience and format give the model a target; adjectives like “good” or “professionally” don't."},
      {q:"“Few-shot” prompting means…", opts:["Keeping the prompt very short","Giving two or three worked examples of what you want","Sending the prompt several times"], a:1, why:"You demonstrate the input→output pattern; the model mirrors it. Examples beat adjectives."},
      {q:"You want the answer as a comparison table. Best move?", opts:["Ask for a 3-column table explicitly","Hope it formats nicely on its own","Raise the temperature"], a:0, why:"State the shape — table, columns, word count — and the model complies; you get reusable structure."},
      {q:"Asking the model to “think step by step” helps most on…", opts:["Rephrasing a sentence","Multi-step reasoning and math","Making text shorter"], a:1, why:"Working through the intermediate steps improves accuracy where the answer depends on them."},
      {q:"The first reply is mediocre. The most effective next move?", opts:["Give up — the tool is weak","Steer it: “tighter, drop the jargon, now for execs”","Resend the exact same prompt"], a:1, why:"Prompting is a loop; treat the first output as a draft and refine it in dialogue."}
    ]},
  {title:"Agents & building Skills", eyebrow:"Section 04 · how AI does work",
    concepts:[
      {k:"giving it hands", h:"Tool use (function calling)", p:"On its own the model only predicts text. Tool use — also called function calling — lets it call real functions: a calculator, a web search, a database, a code runner. It decides when to call one and what to pass, the result comes back into the context, and it carries on. This is how a frozen, offline model touches the live, exact world.", ex:"Ask for arithmetic and it may fumble; give it a calculator and it's exact.", fig:`<svg viewBox="0 0 520 140" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="18" y="16" width="212" height="100" rx="10" fill="var(--ink)" stroke="var(--line)"/><text x="124" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">no tool</text><text x="124" y="68" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">458 × 273 ≈ 120,000</text><text x="124" y="96" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">✗ guesses</text><rect x="290" y="16" width="212" height="100" rx="10" fill="var(--ink)" stroke="var(--mint)"/><text x="396" y="38" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">+ calculator tool</text><text x="396" y="68" font-family="var(--mono)" font-size="13" fill="var(--cream)" text-anchor="middle">458 × 273 = 125,034</text><text x="396" y="96" font-family="var(--mono)" font-size="13" fill="var(--mint)" text-anchor="middle">✓ exact</text><text x="260" y="70" font-family="var(--mono)" font-size="14" fill="var(--muted)" text-anchor="middle">→</text></svg>`},
      {k:"answering from your docs", h:"RAG: retrieval-augmented generation", p:"A base model only knows its training. RAG fixes that at answer time: the system searches your documents for the passages relevant to the question, pastes them into the context, and the model answers from those sources instead of memory. It's how AI handles your private files or this week's news — and because the facts sit right in front of it, hallucination drops.", ex:"“How do I cancel?” quietly finds the doc titled “Ending your subscription.”", fig:`<svg viewBox="0 0 520 140" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="12" y="50" width="104" height="40" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="64" y="74" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">question</text><text x="124" y="74" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="140" y="22" width="120" height="96" rx="8" fill="var(--ink)" stroke="var(--muted)" stroke-dasharray="4 3"/><text x="200" y="38" font-family="var(--mono)" font-size="10" fill="var(--muted)" text-anchor="middle">your documents</text><rect x="152" y="46" width="96" height="15" rx="3" fill="var(--ink)" stroke="var(--line)"/><rect x="152" y="65" width="96" height="15" rx="3" fill="var(--ink)" stroke="var(--mint)"/><text x="200" y="77" font-family="var(--mono)" font-size="9" fill="var(--mint)" text-anchor="middle">✓ match</text><rect x="152" y="84" width="96" height="15" rx="3" fill="var(--ink)" stroke="var(--line)"/><text x="268" y="74" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="284" y="50" width="104" height="40" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="336" y="68" font-family="var(--mono)" font-size="10" fill="var(--cream)" text-anchor="middle">context</text><text x="336" y="82" font-family="var(--mono)" font-size="9" fill="var(--muted)" text-anchor="middle">+ matched docs</text><text x="396" y="74" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="412" y="50" width="96" height="40" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="460" y="74" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">answer</text><text x="260" y="134" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">fetch first, then answer — grounded in sources</text></svg>`},
      {k:"the loop", h:"The agentic loop", p:"A chatbot answers once; an agent keeps going — reason → act (use a tool) → observe the result → decide the next move → repeat, until the goal is met. Say “book me a table” and it searches, checks times, and books, instead of just telling you how.", ex:"A chatbot tells you how; an agent goes and does it."},
      {k:"packaged know-how", h:"What a Skill actually is", p:"A Skill is just a folder. Inside is a SKILL.md file with a name, a short description, and instructions — plus, optionally, scripts and reference files. It packages “how we do this specific job” into something an agent can open, version and share like any document. A bundled script makes a step deterministic instead of improvised.", ex:"A tool is a capability; a Skill is the playbook for using capabilities well.", fig:`<svg viewBox="0 0 520 140" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="150" y="24" width="80" height="14" rx="4" fill="var(--ink)" stroke="var(--amber)"/><rect x="150" y="36" width="220" height="92" rx="10" fill="var(--ink)" stroke="var(--amber)"/><text x="166" y="58" font-family="var(--mono)" font-size="11" fill="var(--amber)">invoice-skill/</text><text x="166" y="80" font-family="var(--mono)" font-size="11" fill="var(--cream)">SKILL.md — name + description</text><text x="166" y="100" font-family="var(--mono)" font-size="11" fill="var(--cream)">instructions (the how)</text><text x="166" y="120" font-family="var(--mono)" font-size="11" fill="var(--muted)">+ script (optional, deterministic)</text></svg>`},
      {k:"efficiency", h:"Progressive disclosure", p:"The agent pre-reads only each Skill's name and description — just enough to know when it applies. It opens the full instructions only when that Skill is actually relevant. So you can install dozens of Skills without clogging the context: detail loads on demand, not all at once.", ex:"Load the detail when it's needed, not before.", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><text x="14" y="20" font-family="var(--mono)" font-size="11" fill="var(--muted)">always loaded (tiny):</text><rect x="14" y="28" width="200" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="24" y="42" font-family="var(--mono)" font-size="10" fill="var(--cream)">invoices · name + desc</text><rect x="14" y="52" width="200" height="20" rx="5" fill="var(--ink)" stroke="var(--mint)"/><text x="24" y="66" font-family="var(--mono)" font-size="10" fill="var(--mint)">refunds · name + desc  ✓</text><rect x="14" y="76" width="200" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="24" y="90" font-family="var(--mono)" font-size="10" fill="var(--cream)">reports · name + desc</text><rect x="14" y="100" width="200" height="20" rx="5" fill="var(--ink)" stroke="var(--line)"/><text x="24" y="114" font-family="var(--mono)" font-size="10" fill="var(--cream)">scheduling · name + desc</text><text x="226" y="66" font-family="var(--mono)" font-size="13" fill="var(--muted)">→</text><rect x="248" y="40" width="258" height="72" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="262" y="60" font-family="var(--mono)" font-size="10" fill="var(--muted)">opened only when relevant:</text><text x="262" y="80" font-family="var(--mono)" font-size="11" fill="var(--cream)">refunds → full instructions</text><text x="262" y="98" font-family="var(--mono)" font-size="10" fill="var(--muted)">(the rest stay collapsed)</text><text x="260" y="138" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">dozens of skills, context stays light</text></svg>`}
    ],
    quiz:[
      {q:"An AI keeps getting big multiplications slightly wrong. The fix?", opts:["Give it a calculator tool to call","Use a longer prompt","Raise the temperature"], a:0, why:"Tool use (function calling) lets it hand the exact work to a calculator and read the result back."},
      {q:"How can an AI answer questions about your company's private docs without being retrained?", opts:["It memorises them overnight","RAG retrieves the relevant passages into the context at answer time","It guesses from general knowledge"], a:1, why:"RAG fetches your documents into context, so it answers from sources — which also cuts hallucination."},
      {q:"What makes an agent different from a chatbot?", opts:["A bigger model","It works in a reason→act→observe loop toward a goal","It only replies in JSON"], a:1, why:"An agent acts and observes across steps until the goal is met; a chatbot answers once."},
      {q:"A Skill is best described as…", opts:["A single capability like a calculator","A folder (SKILL.md + instructions, maybe scripts) telling an agent how to do a task","A faster model"], a:1, why:"A tool is a capability; a Skill packages the know-how — when and how — as files the agent opens."},
      {q:"Why can an agent have dozens of Skills installed without clogging its context?", opts:["It deletes unused skills","It pre-loads only each skill's name + description, opening the full detail on demand","It gives each skill a bigger context window"], a:1, why:"Progressive disclosure: names and descriptions are always loaded; full instructions load only when relevant."}
    ]},
  {title:"Building internal tools", eyebrow:"Section 05 · applied",
    concepts:[
      {k:"use case", h:"Pick the right first job", p:"AI tools pay off on work that's repetitive, structured, high-volume and well-defined — like turning messy client spreadsheets into clean summaries, or meeting notes into an action list. Start narrow and provable; a tool that nails one boring job earns trust for the next. Vague, creative, one-off work is the worst first pick.", ex:"Good first build: a CSV → a drafted report. Bad first build: “write our strategy.”", fig:`<svg viewBox="0 0 520 140" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="16" y="20" width="234" height="100" rx="10" fill="var(--ink)" stroke="var(--mint)"/><text x="133" y="42" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">good first job</text><text x="133" y="68" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">repetitive · structured · clear</text><text x="133" y="92" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">CSV → clean report</text><rect x="270" y="20" width="234" height="100" rx="10" fill="var(--ink)" stroke="var(--muted)" stroke-dasharray="4 3"/><text x="387" y="42" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">poor first job</text><text x="387" y="68" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">vague · creative · one-off</text><text x="387" y="92" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">“write our strategy”</text></svg>`},
      {k:"the decision", h:"Choose the cheapest approach that works", p:"Match the tool to the need. Need better wording? Prompt it. Need it to know your facts? RAG. Need a repeatable procedure? A Skill. Need a multi-step job done on its own? An agent. Need to change default behaviour at scale? Fine-tuning — rarely. Reaching for the heaviest option first is the classic mistake.", ex:"Most “we need to fine-tune” problems are really prompt or RAG problems.", fig:`<svg viewBox="0 0 520 150" width="100%" style="max-width:100%;height:auto;margin-top:6px"><line x1="250" y1="10" x2="250" y2="142" stroke="var(--line)"/><text x="20" y="20" font-family="var(--mono)" font-size="10" fill="var(--muted)">you need…</text><text x="270" y="20" font-family="var(--mono)" font-size="10" fill="var(--muted)">reach for…</text><text x="20" y="44" font-family="var(--mono)" font-size="11" fill="var(--cream)">better wording</text><text x="270" y="44" font-family="var(--mono)" font-size="11" fill="var(--mint)">a better prompt</text><text x="20" y="68" font-family="var(--mono)" font-size="11" fill="var(--cream)">it to know your facts</text><text x="270" y="68" font-family="var(--mono)" font-size="11" fill="var(--mint)">RAG</text><text x="20" y="92" font-family="var(--mono)" font-size="11" fill="var(--cream)">a repeatable procedure</text><text x="270" y="92" font-family="var(--mono)" font-size="11" fill="var(--mint)">a Skill</text><text x="20" y="116" font-family="var(--mono)" font-size="11" fill="var(--cream)">a multi-step job done</text><text x="270" y="116" font-family="var(--mono)" font-size="11" fill="var(--mint)">an agent</text><text x="20" y="140" font-family="var(--mono)" font-size="11" fill="var(--cream)">to change behaviour</text><text x="270" y="140" font-family="var(--mono)" font-size="11" fill="var(--muted)">fine-tune (rare)</text></svg>`},
      {k:"security", h:"Keep the key on the server", p:"If your app calls an AI API, the secret key must live on a server you control — never in the browser. If it ships to the client, anyone can read it from network requests and spend your money.", ex:"Browser → your server → the AI API. Never browser → AI API."},
      {k:"guardrails", h:"Keep a human in the loop", p:"On anything that drives a decision, money, or an external message, a person checks the output against ground truth before it's acted on. Build the checkpoint in: the tool drafts, a human approves. The model assists; it doesn't get the final word on high-stakes calls. Decide up front which actions may never run unattended.", ex:"Especially for client-facing numbers, money, and anything you can't undo.", fig:`<svg viewBox="0 0 520 120" width="100%" style="max-width:100%;height:auto;margin-top:6px"><rect x="20" y="42" width="120" height="36" rx="8" fill="var(--ink)" stroke="var(--line)"/><text x="80" y="64" font-family="var(--mono)" font-size="11" fill="var(--cream)" text-anchor="middle">AI drafts</text><text x="156" y="64" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="174" y="42" width="152" height="36" rx="8" fill="var(--ink)" stroke="var(--amber)"/><text x="250" y="64" font-family="var(--mono)" font-size="11" fill="var(--amber)" text-anchor="middle">human approves ✓</text><text x="342" y="64" font-family="var(--mono)" font-size="13" fill="var(--muted)" text-anchor="middle">→</text><rect x="360" y="42" width="144" height="36" rx="8" fill="var(--ink)" stroke="var(--mint)"/><text x="432" y="64" font-family="var(--mono)" font-size="11" fill="var(--mint)" text-anchor="middle">send / act</text><text x="260" y="104" font-family="var(--mono)" font-size="11" fill="var(--muted)" text-anchor="middle">draft automatically, approve deliberately</text></svg>`},

"middle">berry</text><text x="14" y="122" font-family="var(--mono)" font-size="11" fill="var(--mint)">≈ 3–4 caracteres por token — nunca vê letras isoladas</text></svg>`},

ilhado (ex. 200K tokens)</text></svg>`},
