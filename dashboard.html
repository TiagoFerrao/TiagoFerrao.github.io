  <style>
    .dash-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: var(--space-2xl);
    }
    .dash-gate .lock-icon {
      width: 64px;
      height: 64px;
      color: var(--accent-primary);
      margin-bottom: var(--space-lg);
    }
    .dash-gate h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-sm);
    }
    .dash-gate p {
      color: var(--text-muted);
      margin-bottom: var(--space-xl);
      font-size: var(--text-sm);
    }
    .pass-form {
      display: flex;
      gap: var(--space-sm);
      max-width: 360px;
      width: 100%;
    }
    .pass-form input {
      flex: 1;
      padding: 12px 16px;
      border-radius: var(--border-radius-sm);
      border: 1px solid var(--border-medium);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--text-base);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .pass-form input:focus {
      border-color: var(--accent-primary);
    }
    .pass-form button {
      padding: 12px 24px;
      border-radius: var(--border-radius-sm);
      border: none;
      background: var(--accent-primary);
      color: var(--text-on-accent);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .pass-form button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .pass-error {
      color: #ef4444;
      font-size: var(--text-sm);
      margin-top: var(--space-sm);
      min-height: 20px;
    }
    .dash-frame-wrap {
      display: none;
      width: 100%;
      margin-top: var(--space-lg);
    }
    .dash-frame-wrap iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--border-radius-md);
      background: #0f172a;
    }
    .dash-frame-wrap.visible {
      display: block;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: var(--text-sm);
      margin-bottom: var(--space-lg);
      transition: color var(--transition-fast);
    }
    .back-link:hover { color: var(--accent-primary); }
  </style>
</head>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-brand">

      </a>

  <!-- MAIN -->

    <div class="container">
      <a href="index.html" class="back-link">

        Back to Home

      <!-- PASSWORD GATE -->
      <div id="gate" class="dash-gate">
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
        <h2>Protected Dashboard</h2>
        <p>This dashboard is password-protected. Enter the access code to continue.</p>
        <form class="pass-form" onsubmit="checkPass(event)">
          <input type="password" id="passInput" placeholder="Enter password" autocomplete="off" autofocus>
          <button type="submit">Unlock</button>
        </form>
        <div class="pass-error" id="passError"></div>
      </div>

      <!-- DASHBOARD (hidden until authenticated) -->
      <div id="dashWrap" class="dash-frame-wrap">
        <!-- iframe src set dynamically after auth -->
        <iframe id="dashFrame" title="Support Performance Dashboard" allowfullscreen></iframe>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    const HASH = 'b35eed2559a1f798ff9e4ce4e8bb137573d4c4b3a5661405c4affc39cf6cc4a6';

    async function sha256(text) {
      const encoded = new TextEncoder().encode(text);
      const buffer = await crypto.subtle.digest('SHA-256', encoded);
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPass(e) {
      e.preventDefault();
      const input = document.getElementById('passInput').value;
      const hash = await sha256(input);
      if (hash === HASH) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashWrap').classList.add('visible');
        document.getElementById('dashFrame').src = 'dashboard-embed.html';
      } else {
        document.getElementById('passError').textContent = 'Incorrect password. Please try again.';
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
      }
    }
  </script>
