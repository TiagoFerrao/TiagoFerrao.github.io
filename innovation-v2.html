<!DOCTYPE html>
<html lang="en" data-theme="teal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#001a20">
  <title>Bringing Ideas to Investors (preview) | Tiago Ferrão</title>
  <meta name="description" content="From a raw idea to a board-ready pitch — a step-by-step process with the tools for each phase.">
  <link rel="icon" href="img/bee.png">
  <link rel="apple-touch-icon" href="img/bee.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/responsive.css?v=2">
  <style>
    /* ===== hybrid innovation process (page-specific; shared tokens) ===== */
    .preview-flag { font-family: var(--font-body); font-size: .72rem; color: var(--accent-secondary);
      border: 1px dashed var(--border-medium); border-radius: 8px; padding: 6px 12px; display: inline-block; margin-bottom: var(--space-lg); }

    /* horizontal phase rail: travelling assumptions marker · dots with bidirectional arrows */
    .phaserail { position: relative; margin: 0 0 var(--space-2xl); padding-bottom: 52px; }

    /* the assumptions tracker — born at Problem Validation, travels & updates each phase after */
    .atrack { position: absolute; bottom: 0; left: 0; transform: translateX(-50%); text-align: center;
      transition: left .45s cubic-bezier(.4,0,.2,1), opacity .3s ease; pointer-events: none; z-index: 3; }
    .atrack.hidden { opacity: 0; }
    .atrack .tab { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
      background: var(--bg-surface); border: 1px solid var(--accent-primary); border-radius: 999px;
      padding: 5px 13px; color: var(--accent-primary); font-family: var(--font-body); font-size: .66rem;
      box-shadow: 0 0 12px rgba(var(--accent-primary-rgb), .15); }
    .atrack .tab .st { color: var(--text-muted); }
    .atrack::before { content: ""; position: absolute; left: 50%; bottom: 100%; width: 1px; height: 10px;
      background: var(--accent-primary); opacity: .45; transform: translateX(-50%); }
    .phasenav { position: relative; display: flex; align-items: stretch; gap: 8px;
      padding: 0; overflow-x: auto; scrollbar-width: thin; }
    /* phase chip specs copied from innovation.html's phase bar */
    .pbox { flex: 1 1 0; min-width: 132px; background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-strong); border-radius: 10px; padding: 8px 14px; cursor: pointer; text-align: left;
      transition: border-color .2s ease, background .2s ease; }
    .pbox .pn { font-family: var(--font-body); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-primary); }
    .pbox .nm { font-family: var(--font-display); font-size: 0.8rem; color: var(--text-primary); margin-top: 2px; line-height: 1.25; }
    .pbox:hover { border-color: var(--accent-primary); }
    .pbox.on { background: var(--accent-primary); border-color: var(--accent-primary); }
    .pbox.on .pn, .pbox.on .nm { color: var(--bg-primary); }

    /* content panel */
    .ppanel { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: var(--space-xl) var(--space-2xl); transition: opacity .2s ease; }
    .ppanel.swap { opacity: 0; }
    .pp-tag { font-family: var(--font-body); font-size: .66rem; letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted); }
    .pp-title { font-family: var(--font-display); font-size: 1.5rem; margin: 5px 0 12px; }
    .pp-ctx { color: var(--text-secondary); line-height: 1.7; max-width: 72ch; margin-bottom: 14px; }
    .pp-ctx strong { color: var(--text-primary); }
    .io { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 8px; font-family: var(--font-body);
      font-size: .8rem; background: rgba(0,0,0,.16); border: 1px solid var(--border-subtle); border-radius: 8px;
      padding: 8px 12px; margin: 0 0 20px; }
    .io .lbl { color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; font-size: .62rem; }
    .io .in { color: var(--text-secondary); } .io .arrow { color: var(--accent-primary); } .io .out { color: var(--accent-primary); }

    /* vertical mini-workflow inside a phase */
    .miniflow { margin: 4px 0 6px; }
    .mini { position: relative; padding: 0 0 16px 30px; }
    .mini::before { content: ""; position: absolute; left: 8px; top: 20px; bottom: -2px; width: 1px; background: var(--border-medium); }
    .mini:last-child::before { display: none; }
    .mini .mnode { position: absolute; left: 0; top: 4px; width: 17px; height: 17px; border-radius: 50%;
      border: 1px solid var(--accent-secondary); background: var(--bg-primary); display: flex; align-items: center;
      justify-content: center; font-family: var(--font-body); font-size: .6rem; color: var(--accent-primary); }
    .mini .mnode svg { width: 11px; height: 11px; }
    .mini .mt { font-weight: 600; color: var(--text-primary); font-size: .95rem; }
    .mini .md { color: var(--text-secondary); font-size: .88rem; line-height: 1.6; margin-top: 2px; max-width: 70ch; }

    .anote { font-size: .85rem; color: var(--text-secondary); border-left: 2px solid var(--accent-secondary);
      padding: 4px 0 4px 12px; margin: 14px 0 2px; }
    .anote b { color: var(--accent-primary); }

    .tools-lbl { font-family: var(--font-body); font-size: .64rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-muted); margin: 20px 0 8px; }
    .tools { display: flex; flex-wrap: wrap; gap: 10px; }
    .tools .tl { display: inline-flex; flex-direction: column; gap: 2px; min-width: 184px; text-decoration: none;
      background: var(--bg-primary); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px 13px;
      transition: border-color .2s ease, transform .2s ease; }
    .tools .tl:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
    .tools .tl .nm { font-family: var(--font-body); font-size: .82rem; color: var(--accent-primary); }
    .tools .tl .ds { font-size: .72rem; color: var(--text-muted); line-height: 1.4; }
    .tools .tl.soon { opacity: .5; }  .tools .tl.soon .nm { color: var(--text-muted); }

    .pp-nav { display: flex; justify-content: space-between; margin-top: var(--space-xl); }
    .pp-nav button { font-family: var(--font-body); font-size: .8rem; color: var(--text-secondary);
      background: transparent; border: 1px solid var(--border-medium); border-radius: 8px; padding: 8px 14px; cursor: pointer; }
    .pp-nav button:hover { color: var(--accent-primary); border-color: var(--accent-primary); }
    .pp-nav button:disabled { opacity: .35; cursor: not-allowed; }

    @media (max-width: 760px) {
      .ppanel { padding: var(--space-lg); }
      /* let the phase chips wrap and compress instead of scrolling, while staying readable */
      .phasenav { flex-wrap: wrap; overflow-x: visible; }
      .pbox { flex: 1 1 96px; min-width: 0; padding: 7px 11px; }
      .pbox .nm { font-size: 0.78rem; }
      /* assumptions tracker parks statically below the grid (no sliding on a wrapped layout) */
      .phaserail { padding-bottom: 0; }
      .atrack { position: static; transform: none; margin-top: 14px; }
      .atrack::before { display: none; }
    }
  </style>
</head>

<body>
  <header id="site-header"></header>

  <main>
    <div class="container">

      <section class="page-header fade-in">
        <!-- Icon: lightbulb -->
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="width:64px;height:64px;margin:0 auto var(--space-lg);color:var(--accent-primary);" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6"/><path d="M10 22h4"/>
          <path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/>
          <path d="M9.5 9.5 12 12l2.5-2.5" opacity="0.5"/>
        </svg>
        <h2>Bringing Ideas to Investors</h2>
        <p>From a raw idea to a board-ready pitch — pick a phase to see what it's for, the mini-workflow inside it, and the tools for each.</p>
      </section>

      <p class="preview-flag">⚙ hybrid layout — preview / work in progress</p>

      <!-- horizontal phase rail: dots with bidirectional arrows · travelling assumptions marker -->
      <div class="phaserail">
        <nav class="phasenav" id="phasenav" aria-label="Process phases"></nav>
        <div class="atrack hidden" id="atrack" aria-hidden="true">
          <span class="tab">⊟ assumptions tracker <span class="st"></span></span>
        </div>
      </div>

      <!-- content for the selected phase -->
      <div class="ppanel" id="ppanel" aria-live="polite"></div>

    </div>
  </main>

  <footer id="site-footer"></footer>
  <button id="theme-toggle"></button>

  <script src="js/header.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
  <script>
  (function () {
    var TOOLS = {
      'assumptions-tracker': { nm: 'assumptions-tracker', ds: 'score by impact × uncertainty, plan experiments', href: 'tools/assumptions-tracker.html' },
      'value-proposition':   { nm: 'value-proposition',   ds: 'map customer jobs, pains & gains',                href: 'tools/value-proposition.html' },
      'house-of-quality':    { nm: 'house-of-quality',    ds: 'needs → ranked technical specs',                 href: 'tools/house-of-quality.html' },
      'business-model-canvas':{ nm: 'business-model-canvas', ds: 'the nine building blocks',                    href: 'business-model-canvas/' },
      'platform-model-builder':{ nm: 'platform-model-builder', ds: 'two-sided model + quick estimate',          href: 'business-model-app/' },
      'business-case-builder':{ nm: 'business-case-builder', ds: 'TAM/SOM → multi-year P&L',                    href: 'business-case-builder/' },
      'press-release':       { nm: 'press-release', ds: 'Amazon working-backwards launch story',                href: 'tools/press-release.html' }
    };

    var PHASES = [
      {
        pn: 'Phase 0', lab: 'Idea', tag: 'Phase 0 · Ideation', title: 'Collect & structure ideas',
        ctx: 'Ideas are the fuel of innovation — worth little alone, valuable once captured and shaped. Ideation never stops; it runs in the background of everything else.',
        io: ['a raw idea', 'a press release of the chosen idea'],
        steps: [
          { t: 'Collect', d: 'Anyone can submit ideas, continuously — no filter at the door.' },
          { t: 'Evaluate', d: 'Ideas are reviewed periodically against strategy and feasibility.' },
          { t: 'Frame', d: 'The promising ones are shaped into a clear, specific opportunity.' },
          { t: 'Press release', d: 'Work backwards: write the press release announcing the finished product. It crystallises the chosen idea into a story worth validating — if it isn’t compelling, the idea isn’t ready.' }
        ],
        tools: ['press-release']
      },
      {
        pn: 'Phase 1', lab: 'Problem', tag: 'Phase 1 · Problem validation', title: 'Prove the problem is real',
        ctx: 'Most products fail because nobody wants them. So before designing anything, validate the pain — is it <strong>frequent, intense and unsolved today?</strong> Problem-first, not product-first; build painkillers, not vitamins.',
        io: ['a press release', 'a prioritised list of validated pains'],
        steps: [
          { t: 'Possible user pains', d: 'Map every plausible pain the target users might have — broad and unfiltered, each captured as a hypothesis.' },
          { t: 'Validated user pains', d: 'Interviews and evidence separate the real painkillers from the nice-to-have vitamins.' }
        ],
        note: 'This is where the <b>assumptions table</b> is born — every pain enters as a hypothesis, classified by impact and uncertainty, and travels every phase after this.',
        tools: ['assumptions-tracker', 'value-proposition']
      },
      {
        pn: 'Phase 2.1', lab: 'Concept', tag: 'Phase 2.1 · Conceptualization', title: 'Design the solution',
        ctx: 'Design the concept that answers the validated pains — and decide what it deliberately <strong>won’t</strong> do. A focused painkiller beats a sprawling multi-tool.',
        io: ['validated pains', 'a concept + ranked specifications'],
        steps: [
          { t: 'Concept design', d: 'Define what it is, what it does, and what it intentionally leaves out — communicated simply.' },
          { t: 'House of Quality', d: 'Translate the ranked customer needs into concrete, measurable specifications, so effort goes where it kills pain.' },
          { t: 'Competitive scan', d: 'See how alternatives score against the same needs — and where you can stand out.' }
        ],
        tools: ['house-of-quality', 'value-proposition']
      },
      {
        pn: 'Phase 2.2', lab: 'Business', tag: 'Phase 2.2 · Business case', title: 'Build the 360 business case',
        ctx: 'Assemble the full, costed picture a decision-maker needs — every angle in one place.',
        io: ['a concept', 'a defensible business case'],
        steps: [
          { t: 'Opportunity size', d: 'How big is the market, and how much of it can you realistically reach (TAM / SOM)?' },
          { t: 'Cost breakdown', d: 'What it costs to build and operate, component by component.' },
          { t: 'Revenue & business model', d: 'How the concept captures value — pricing, streams, segments, channels.' },
          { t: 'Financial plan', d: 'A multi-year projection of revenues and costs, down to EBITDA.' }
        ],
        tools: ['business-model-canvas', 'platform-model-builder', 'business-case-builder']
      },
      {
        pn: 'Phase 2.3', lab: 'Pitch', tag: 'Phase 2.3 · Plan & pitch', title: 'Plan the validation, then pitch',
        ctx: 'Turn what’s still uncertain into a plan, and ask for a decision.',
        io: ['a business case', 'a green-lit, de-risking plan'],
        steps: [
          { t: 'Validation plan', d: 'The riskiest assumptions become experiments with metrics and kill-criteria — cheap tests before expensive commitments.' },
          { t: 'Pitch', d: 'Present four messages to the board — the opportunity, the solution, the business model, and how you’ll de-risk the unknowns. The ask is explicit: invest, pivot, or stop.' }
        ],
        tools: ['assumptions-tracker']
      }
    ];

    var nav = document.getElementById('phasenav');
    var panel = document.getElementById('ppanel');
    var rail = document.querySelector('.phaserail');
    var atrack = document.getElementById('atrack');
    var active = 0;

    /* position the travelling assumptions tracker over the active phase (from Problem Validation on) */
    function placeTracker(i) {
      if (!atrack || !rail) return;
      var box = nav.querySelectorAll('.pbox')[i];
      if (i < 1 || !box) { atrack.classList.add('hidden'); return; }
      var rr = rail.getBoundingClientRect(), dr = box.getBoundingClientRect();
      atrack.style.left = (dr.left + dr.width / 2 - rr.left) + 'px';
      var st = atrack.querySelector('.st'); if (st) st.textContent = '· ' + (i === 1 ? 'first draft' : 'updated');
      atrack.classList.remove('hidden');
    }

    /* build the dot rail */
    PHASES.forEach(function (p, i) {
      var b = document.createElement('button');
      b.className = 'pbox';
      b.setAttribute('data-i', i);
      b.innerHTML = '<div class="pn">' + p.pn + '</div><div class="nm">' + p.lab + '</div>';
      b.addEventListener('click', function () { setActive(i); });
      nav.appendChild(b);
    });

    function toolCard(id) {
      var t = TOOLS[id]; if (!t) return '';
      if (t.soon) return '<span class="tl soon"><span class="nm">' + t.nm + '</span><span class="ds">' + t.ds + '</span></span>';
      return '<a class="tl" href="' + t.href + '" target="_blank" rel="noopener"><span class="nm">' + t.nm + '</span><span class="ds">' + t.ds + '</span></a>';
    }

    function render(i) {
      var p = PHASES[i];
      var html = '<div class="pp-tag">' + p.tag + '</div>'
        + '<div class="pp-title">' + p.title + '</div>'
        + '<p class="pp-ctx">' + p.ctx + '</p>'
        + '<div class="io"><span class="lbl">in</span><span class="in">' + p.io[0] + '</span><span class="arrow">→</span><span class="lbl">out</span><span class="out">' + p.io[1] + '</span></div>'
        + '<div class="miniflow">' + p.steps.map(function (s, k) {
            return '<div class="mini"><span class="mnode">' + (s.icon || (k + 1)) + '</span><div class="mt">' + s.t + '</div><div class="md">' + s.d + '</div></div>';
          }).join('') + '</div>';
      if (p.note) html += '<div class="anote">' + p.note + '</div>';
      if (p.tools && p.tools.length) html += '<div class="tools-lbl">tools for this phase</div><div class="tools">' + p.tools.map(toolCard).join('') + '</div>';
      html += '<div class="pp-nav">'
        + '<button id="pp-prev"' + (i === 0 ? ' disabled' : '') + '>‹ ' + (i > 0 ? PHASES[i-1].lab : '') + '</button>'
        + '<button id="pp-next"' + (i === PHASES.length - 1 ? ' disabled' : '') + '>' + (i < PHASES.length - 1 ? PHASES[i+1].lab : '') + ' ›</button>'
        + '</div>';
      panel.innerHTML = html;
      var prev = document.getElementById('pp-prev'), next = document.getElementById('pp-next');
      if (prev) prev.addEventListener('click', function () { setActive(i - 1); });
      if (next) next.addEventListener('click', function () { setActive(i + 1); });
    }

    function setActive(i) {
      if (i < 0 || i >= PHASES.length) return;
      active = i;
      Array.prototype.forEach.call(nav.querySelectorAll('.pbox'), function (b, k) {
        b.classList.toggle('on', k === i);
        b.classList.toggle('done', k < i);
      });
      placeTracker(i);
      panel.classList.add('swap');
      setTimeout(function () { render(i); panel.classList.remove('swap'); }, 160);
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') setActive(active + 1);
      else if (e.key === 'ArrowLeft') setActive(active - 1);
    });

    setActive(0);
  })();
  </script>
</body>
</html>
